<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookmarks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --border: rgba(255,255,255,0.06);
    --text: #e8e8e8;
    --muted: #666;
    --accent: #f0c040;
    --hover: rgba(255,255,255,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 72px;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 0; gap: 8px; z-index: 100;
  }
  .logo {
    width: 40px; height: 40px; background: var(--accent); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: #000; margin-bottom: 16px;
  }
  .nav-btn {
    width: 44px; height: 44px; border-radius: 12px; border: none;
    background: transparent; color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .nav-btn:hover, .nav-btn.active { background: var(--hover); color: var(--accent); }

  .main { margin-left: 72px; max-width: 680px; padding: 0 0 80px; }

  .header {
    position: sticky; top: 0;
    background: rgba(10,10,11,0.92); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border); padding: 20px 24px 16px; z-index: 50;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .header h1 { font-family: 'Instrument Serif', serif; font-size: 26px; font-weight: 400; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); font-style: italic; }
  .count-badge { font-size: 11px; font-weight: 600; color: var(--muted); font-family: 'DM Mono', monospace; }

  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #search {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px;
    padding: 10px 12px 10px 38px; outline: none; transition: border-color 0.2s;
  }
  #search:focus { border-color: rgba(240,192,64,0.3); }
  #search::placeholder { color: var(--muted); }

  .filter-section { border-bottom: 1px solid var(--border); }
  .filter-label { padding: 8px 24px 4px; font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; font-family: 'DM Mono', monospace; }
  .filter-bar { display: flex; gap: 6px; padding: 6px 24px 12px; overflow-x: auto; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 11px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .filter-chip:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .filter-chip[data-topic="ai"].active      { background: #7dd3fc; border-color: #7dd3fc; color: #000; }
  .filter-chip[data-topic="design"].active  { background: #c4b5fd; border-color: #c4b5fd; color: #000; }
  .filter-chip[data-topic="music"].active   { background: #f9a8d4; border-color: #f9a8d4; color: #000; }
  .filter-chip[data-topic="ads"].active     { background: #86efac; border-color: #86efac; color: #000; }
  .filter-chip[data-topic="mindset"].active { background: #fdba74; border-color: #fdba74; color: #000; }
  .filter-chip[data-topic="vibes"].active   { background: #f0c040; border-color: #f0c040; color: #000; }
  .filter-chip[data-topic="cars"].active    { background: #fb7185; border-color: #fb7185; color: #000; }
  .filter-chip[data-topic="rabbit hole"].active { background: #a78bfa; border-color: #a78bfa; color: #000; }

  .tweet {
    padding: 18px 24px 16px; border-bottom: 1px solid var(--border);
    display: grid; grid-template-columns: 40px 1fr; gap: 12px;
    animation: fadeIn 0.25s ease both;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .tweet-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .topic-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .tweet-name { font-size: 14px; font-weight: 700; }
  .tweet-handle { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .tweet-date { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-left: auto; }

  .tweet-text { font-size: 14px; line-height: 1.6; color: #d0d0d0; white-space: pre-wrap; word-break: break-word; }
  .tweet-text a { color: #5ba3d9; text-decoration: none; }
  .tweet-text a:hover { text-decoration: underline; }
  .tweet-text.collapsed { max-height: 280px; overflow: hidden; position: relative; }
  .tweet-text.collapsed::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(transparent, var(--bg)); }
  .show-more-btn { background: none; border: none; color: var(--accent); font-size: 13px; font-family: 'Syne', sans-serif; cursor: pointer; padding: 4px 0; margin-top: 4px; display: block; font-weight: 600; }

  .open-x-link {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace;
    text-decoration: none; margin-top: 10px; padding: 5px 10px;
    border: 1px solid var(--border); border-radius: 8px; transition: all 0.2s;
  }
  .open-x-link:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

  /* VIDEO */
  .vp-wrap { margin-top: 12px; border-radius: 14px; overflow: hidden; background: #000; }
  .vp-thumb-state { display: block; position: relative; cursor: pointer; }
  .vp-thumb-state img { display: block; width: 100%; max-height: 500px; object-fit: cover; }
  .vp-play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.25); }
  .vp-play-circle { width: 58px; height: 58px; border-radius: 50%; background: rgba(0,0,0,0.72); border: 2px solid rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(6px); transition: transform 0.15s; }
  .vp-thumb-state:hover .vp-play-circle { transform: scale(1.08); }
  .vp-video-state { display: none; }
  .vp-video-state video { display: block; width: 100%; max-height: 500px; object-fit: contain; background: #000; }
  .vp-controls { display: flex; align-items: center; gap: 8px; padding: 6px 10px 8px; background: rgba(0,0,0,0.85); }
  .vp-btn { background: none; border: none; color: #fff; cursor: pointer; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; flex-shrink: 0; padding: 0; transition: background 0.15s; }
  .vp-btn:hover { background: rgba(255,255,255,0.15); }
  .vp-progress { flex: 1; height: 4px; background: rgba(255,255,255,0.25); border-radius: 2px; cursor: pointer; }
  .vp-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; pointer-events: none; }
  .vp-time { font-size: 10px; color: rgba(255,255,255,0.75); font-family: 'DM Mono', monospace; white-space: nowrap; flex-shrink: 0; }
  .vp-vol { width: 56px; height: 3px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.25); border-radius: 2px; cursor: pointer; flex-shrink: 0; }
  .vp-vol::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #fff; }

  /* Video thumb only (no MP4) — shows thumb + "open on X" overlay */
  .vt-wrap { margin-top: 12px; border-radius: 14px; overflow: hidden; position: relative; cursor: pointer; }
  .vt-wrap img { display: block; width: 100%; max-height: 400px; object-fit: cover; }
  .vt-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.35); }
  .vt-play-circle { width: 58px; height: 58px; border-radius: 50%; background: rgba(0,0,0,0.72); border: 2px solid rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
  .vt-label { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 10px; color: rgba(255,255,255,0.7); font-family: 'DM Mono', monospace; background: rgba(0,0,0,0.6); padding: 3px 8px; border-radius: 4px; white-space: nowrap; }

  /* GIF */
  .gif-wrap { margin-top: 12px; border-radius: 14px; overflow: hidden; position: relative; background: #000; }
  .gif-wrap video { display: block; width: 100%; max-height: 480px; object-fit: cover; }
  .gif-badge { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.75); color: #fff; font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace; padding: 2px 7px; border-radius: 4px; letter-spacing: 1px; }

  /* Photos */
  .photo-grid { margin-top: 12px; border-radius: 12px; overflow: hidden; display: grid; gap: 2px; }
  .photo-grid.n1 { grid-template-columns: 1fr; }
  .photo-grid.n2 { grid-template-columns: 1fr 1fr; }
  .photo-grid.n3 { grid-template-columns: 1fr 1fr; }
  .photo-grid.n3 .photo-cell:first-child { grid-row: 1/3; }
  .photo-grid.n4 { grid-template-columns: 1fr 1fr; }
  .photo-cell { overflow: hidden; background: #1a1a1a; aspect-ratio: 1; cursor: pointer; }
  .photo-grid.n1 .photo-cell { aspect-ratio: unset; max-height: 440px; }
  .photo-cell img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
  .photo-cell:hover img { transform: scale(1.03); }

  /* Lightbox */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  #lb-content img { max-width: 92vw; max-height: 92vh; border-radius: 8px; display: block; }
  .lb-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .lb-close:hover { background: rgba(255,255,255,0.2); }

  .stats { padding: 12px 24px; display: flex; gap: 20px; border-bottom: 1px solid var(--border); }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .stat-label { font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; }
  .empty { padding: 80px 24px; text-align: center; color: var(--muted); }
  .empty p { font-size: 14px; margin-top: 8px; }

  @media (max-width: 600px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .tweet { padding: 14px 16px; }
    .header { padding: 14px 16px; }
    .filter-bar { padding: 6px 16px 10px; }
    .filter-label { padding: 8px 16px 4px; }
  }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="logo">B</div>
  <button class="nav-btn active" title="Bookmarks">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
  </button>
  <button class="nav-btn" title="Search" onclick="document.getElementById('search').focus()">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
</aside>

<div class="main">
  <div class="header">
    <div class="header-top">
      <h1>Book<span>marks</span></h1>
      <span class="count-badge" id="count-badge">— saved</span>
    </div>
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search bookmarks..." autocomplete="off">
    </div>
  </div>

  <div class="stats">
    <div class="stat"><span class="stat-num" id="s-total">—</span><span class="stat-label">Saved</span></div>
    <div class="stat"><span class="stat-num" id="s-photos">—</span><span class="stat-label">Photos</span></div>
    <div class="stat"><span class="stat-num" id="s-videos">—</span><span class="stat-label">Videos</span></div>
    <div class="stat"><span class="stat-num" id="s-authors">—</span><span class="stat-label">Authors</span></div>
  </div>

  <div class="filter-section">
    <div class="filter-label">Media</div>
    <div class="filter-bar" id="media-bar">
      <button class="filter-chip active" data-media="all">All</button>
      <button class="filter-chip" data-media="photo">📷 Photos</button>
      <button class="filter-chip" data-media="video">🎬 Videos</button>
      <button class="filter-chip" data-media="text">✏️ Text only</button>
    </div>
    <div class="filter-label">Topic</div>
    <div class="filter-bar" id="topic-bar">
      <button class="filter-chip active" data-topic="all">All</button>
      <button class="filter-chip" data-topic="ads">📈 Ads &amp; Marketing</button>
      <button class="filter-chip" data-topic="mindset">💡 Mindset</button>
      <button class="filter-chip" data-topic="design">🎨 Design</button>
      <button class="filter-chip" data-topic="ai">🤖 AI &amp; Tech</button>
      <button class="filter-chip" data-topic="vibes">✨ Vibes</button>
      <button class="filter-chip" data-topic="music">🎵 Music</button>
      <button class="filter-chip" data-topic="rabbit hole">🕳️ Rabbit Hole</button>
      <button class="filter-chip" data-topic="cars">🚗 Cars</button>
    </div>
  </div>

  <div id="feed"></div>
</div>

<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLb()">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <div id="lb-content"></div>
</div>

<script>
const TWEETS = [{"id": "2028055985332355163", "bookmark_date": "2026-03-01T12:38:20.961Z", "tweeted_at": "2026-03-01T10:33:21.000Z", "screen_name": "thebeautyofsaas", "name": "BOSS", "avatar": "https://pbs.twimg.com/profile_images/2012506138550349824/H7NOzq7E_normal.jpg", "text": "this is a waste of time for 80% of people trying to improve their quality of life\n\nyou need to learn how to use AI and optimize your workflows, which should take you &lt;2 wks. the REAL advantage is learning how to be HUMAN. Sell, market, become aware, reprogram your thoughts...", "tweet_url": "https://x.com/thebeautyofsaas/status/2028055985332355163", "media": [], "is_long": false, "topic": "ai"}, {"id": "2027842412429685170", "bookmark_date": "2026-03-01T06:34:14.616Z", "tweeted_at": "2026-02-28T20:24:41.000Z", "screen_name": "iblamejulius", "name": "Buyer of Media", "avatar": "https://pbs.twimg.com/profile_images/1963029953244479488/aBdx6i8B_normal.jpg", "text": "Shalom nigga, \nHere\u2019s legit 7 figures worth of creative testing principles for you (alligned with the Andromegayjew shit) \n\nFirst things first, account structure isn\u2019t nearly as important as messaging structure. \n\nYou can use CBO, ABO, ASC, flexible, I don\u2019t care and there are much better TECHNICAL media buyers out there than me who have content on this. \n\nWhat I\u2019ll be focused on how I personally \u201cbatch\u201d creatives, ideate on net new creatives and my variable hierarchy in the ad account. \n\nAny account structure shit is just my personal preference. \n\nBack to it: I use creative \u201cconcepts\u201d. \nI\u2019m sure you\u2019ve heard this term thrown around but there isn\u2019t a uniform definition of what a \u201cconcept\u201d is. \n\nMy personal defition is dumby simple: 1. \u201cwho exactly am I talking to\u201d and 2. \u201chow do I approach them\". That's it. As you can imagine, there's plenty of variations for both. \nThat's the job of the individual creative.  \n\nIn the ad account (again, personal preference):\n- Each concept gets an ID, i.e. CID 1.\n- Each concept is its own ad set. \n- Each unique creative is an ad\n- Each ad per concept gets a decimal I.e. CID 1.1, 1.2, etc. \n\nNow I'll go into how I build new concept. For the examples, assume I\u2019m selling beef tallow. \n\nI have 3 core building blocks for each concept (I personally know some people who do more/ less but this is what works best for me)\n\n1. Persona (the single most important building block) :\n- Highly specific demographics & psychographics pulled from my market research Manus skill.\nTheir exact situation, desires (spoken and unspoken), perceived roadblocks, pain points. \nSpecificity is more important than depth here, depth is what we\u2019ll test on the creative/ ad level.\n\nThat being said sometimes I\u2019ll bundle a couple persona subsets in one specific angle if my research points me in that direction.\n\nExample: \u201ccareer-driven man in his mid- 50s who\u2019s noticing that his youth and vitality is slipping away. Even though he\u2019s achieved material and career success, he lays awake at night reminiscing on how \u201calive\u201d he felt when he had \u201cless\u201d. \n\n2. Angle: \n- this is a specific use case/ utility of my product/ service that solves a specific problem my persona is currently experiencing.\n\nExample: \nProblem: vatality/ youth -> looking younger -> getting rid of the signs of aging on the face. \nUtility: Beef tallow has powerful nutrients that reverse the signs of aging. \n\n3. Sophistication level: \nWhat sophistication segment am I trying to speak to? Where exactly are they in their journey of discovering a solution to their pain? Sophistication (and awareness) is a sliding scale in every single market. Lot of people forget this. \n\nExamples: \na. \"Hasn't really tried any skincare products, he's too busy on more 'important' things like work to focus on his skin.\"  \nFor this awarness segment of my persona I simply need to build the belief that better skin = getting his youth/ vitality back -> briefly touch on the mechanism then introduce product. \n\nb. \"Has tried a bunch of serums and creams that promised the world but never yielded any results\" \nFor this sophistication segment of my persona I need to lean heavy into the UPM (unique problem mechanism) that has lead to all of his previous failed attempts then transition into why the core drivers of my mechanism overcome that UPM. \n\nFinal concept example:\nA career-driven man in his mid- 50s who desperately yearns for  youth and vitality. He can use beef tallow to turn back the clock and erase the years that his face is showing. He hasn't tried skin care before as he doesn't yet know that he can reverse the years from showing on his face. \n\nNow we get to the creatives in each concept. \n\nThere\u2019s two primary variables that I test, each has its own weight. \n\nVariable 1: copy (60-70% weight) .\nExamples (not an exhaustive list I\u2019d be here all day):\n\n- specific \u201cdrivers\u201d of the mechanism your product/ service has that logically align with the angle (super fucking important) \n\n- values, attitudes, lifestyle, ideology, I.e. LOHAS, environmentalist, conservative, culturalist, etc. \n\n- buyer type- specific messaging  I.e. auto-convincer, expressive, analytical, heard-follower, etc. \n\n- belief ladder/s based on the awareness/ sophistication level if there are specific biases I want to overcome. \n\n- tone. This is one of my favorite things to test. Ever notice how there can be two people sharing the same exact idea, but you tend to resonate with Person A over Person B simply due to how the idea is conveyed verbally? Some people resonate with humor, some with candor, others with empathy, etc. You can frame a message in a dozen ways to hit deeply with those people (pro tip: you can extract the most common tone patterns your persona is most likely to connect with during your market research process). \n\n- linguistic patterns & terminology used by the target persona. \n\n- specific pains, unfulfilled desires and core motivators. I won\u2019t test each individually if I see a common pattern from the research. \n\nExample: \"what if the face that stares back at you in the mirror every night could tell a different story? A story of a man who's as strong and full of life as he was in his 20s?)\n\nVariable 2: communication medium aka format.\nThis one\u2019s obvious, here are a few examples: \n\n- direct-to-camera video \n- animation \n- UGC selfie vid \n- product/ service demo \n- green screen\n- native b-roll \n- etc etc etc \n\nNote: I tend to lump statics into the same ad set but a few people like @markbuildsbrand advise against it. Mark is the \ud83d\udc10 so I highly advise you test his advice. \n\nAight that\u2019s it nigga", "tweet_url": "https://x.com/iblamejulius/status/2027842412429685170", "media": [], "is_long": true, "topic": "ads"}, {"id": "2027769729448841604", "bookmark_date": "2026-02-28T18:04:17.267Z", "tweeted_at": "2026-02-28T15:35:52.000Z", "screen_name": "theJayAlto", "name": "Jay Alto", "avatar": "https://pbs.twimg.com/profile_images/1663279003245920256/xdq9i4T3_normal.jpg", "text": "steve jobs gave everyone a bicycle for the mind but forgot most people don't have anywhere to go", "tweet_url": "https://x.com/theJayAlto/status/2027769729448841604", "media": [], "is_long": false, "topic": "mindset"}, {"id": "2027640141645246907", "bookmark_date": "2026-02-28T16:52:51.584Z", "tweeted_at": "2026-02-28T07:00:56.000Z", "screen_name": "kuxshl", "name": "kushal", "avatar": "https://pbs.twimg.com/profile_images/2010708989231988736/IO_odUHH_normal.jpg", "text": "moneyyy branding \n\nw/ oakline", "tweet_url": "https://x.com/kuxshl/status/2027640141645246907", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/HCOf8jUWgAInkyV.jpg"}, {"type": "photo", "url": "https://pbs.twimg.com/media/HCOf8jUWMAIukhP.jpg"}, {"type": "photo", "url": "https://pbs.twimg. 5482858975023104/s9wmB9qT_normal.jpg", "text": "Fun-maxxing is the path to excellence in 2026", "tweet_url": "https://x.com/beffjezos/status/2026561413167055083", "media": [{"type": "video", "url": "https://video.twimg.com/ext_tw_video/2026561367272996864/pu/vid/avc1/720x1280/dCNsmgj-ceN5HSwO.mp4?tag=19", "thumb": "https://pbs.twimg.com/ext_tw_video_thumb/2026561367272996864/pu/img/YGEv4wN_Ukw1CwLS.jpg", "duration": 56007, "aspect": [9, 16]}], "is_long": false, "topic": "mindset"}, {"id": "2026512730098708938", "bookmark_date": "2026-02-25T07:08:29.101Z", "tweeted_at": "2026-02-25T04:21:00.000Z", "screen_name": "Sierra_rak", "name": "Sierra", "avatar": "https://pbs.twimg.com/profile_images/1997684554967216128/CQSAP7cg_normal.jpg", "text": "These were her conditions to return to ice-skating:\n\n-She picks the music \n\n-She has full control over how she looks\n\n-She gets to eat whatever she wants. Her coaches can\u2019t starve her anymore\n\n-The choreo will be a collaborative effort w/ her, she gets to put elements in that she wants to\n\n-She decides when she needs a break from training, never pushing past her limit\n\n-And her father has to keep his controlling ass out of her art. She said \u2018I love you dad, but you\u2019re not allowed back in.\u2019\n\nAlyssa Liu danced for the joy of it, not for a medal, not for prestige, because she just loves her art.\n\nShe retired at 16 - a world champion - because she lost touch with the joy. The men around her were driving her career, starving, shaping and controlling her. She rebelled and cast off the chains to go live her best life as a normal teen girl.\n\nShe returned a young woman unapologetically and uncompromisingly in charge of her own joy and passion, here to do it her way, and only her way.\n\nBecame world champ at 19 in 2025, ans now gold medalist at 20.", "tweet_url": "https://x.com/Sierra_rak/status/2026512730098708938", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/HB-XEAYaYAAETkw.jpg"}, {"type": "photo", "url": "https://pbs.twimg.com/media/HB-XEBbasAAKn62.jpg"}], "is_long": true, "topic": "mindset"}, {"id": "2026362526670172335", "bookmark_date": "2026-02-25T13:11:27.993Z", "tweeted_at": "2026-02-24T18:24:09.000Z", "screen_name": "primed25", "name": "primed", "avatar": "https://pbs.twimg.com/profile_images/2026144160814637056/xGx5ItzY_normal.jpg", "text": "how it feels to jestermaxx in a room full of emploids", "tweet_url": "https://x.com/primed25/status/2026362526670172335", "media": [{"type": "video", "url": "https://video.twimg.com/amplify_video/2026362427445526528/vid/avc1/1000x720/_se3-AHb-qjtustl.mp4?tag=21", "thumb": "https://pbs.twimg.com/amplify_video_thumb/2026362427445526528/img/QVqN7DFjCG8qzewY.jpg", "duration": 60534, "aspect": [25, 18]}], "is_long": false, "topic": "mindset"}, {"id": "2026325419394474466", "bookmark_date": "2026-02-25T13:32:42.431Z", "tweeted_at": "2026-02-24T15:56:41.000Z", "screen_name": "damnidc__", "name": "\ud83e\udda2", "avatar": "https://pbs.twimg.com/profile_images/1996902070004183040/uuVh2Fxm_normal.jpg", "text": "I was offered $95K. I asked for $110K. They came back with $105K.I accepted. The 30 seconds of discomfort asking for more earned me an extra $10K/year. This is where context matters; that's $50K over 5 years. For 30 seconds of awkwardness.\n\nAlways negotiate. Always.", "tweet_url": "https://x.com/damnidc__/status/2026325419394474466", "media": [], "is_long": false, "topic": "mindset"}, {"id": "2026220589938315548", "bookmark_date": "2026-02-24T20:24:46.691Z", "tweeted_at": "2026-02-24T09:00:08.000Z", "screen_name": "Dante_damned", "name": "Dante", "avatar": "https://pbs.twimg.com/profile_images/1999746744134041602/dRf0oGzj_normal.jpg", "text": "Brand Exploration on caffeine. \nWeb implementations comes next.\nStay Put!", "tweet_url": "https://x.com/Dante_damned/status/2026220589938315548", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/HB6TFWFasAE9s1F.jpg"}], "is_long": false, "to ": "damianplayer", "name": "Damian Player", "avatar": "https://pbs.twimg.com/profile_images/1919117586735742976/llztJcpL_normal.jpg", "text": "got offered $250K/year + equity at a fast-growing startup last week. turned it down.\n\nwhen you\u2019re building something that compounds, a salary is a ceiling.\n\nif you keep getting tempted by \u201csafe\u201d offers, ask yourself:\n\n-are you building something you\u2019d regret walking away from?\n\n-is your upside capped by someone else\u2019s cap table?\n\n-would you take the offer if your business was 6 months further along?\n\nthat last one is the tell. keep going and know that I\u2019m rooting for you..", "tweet_url": "https://x.com/damianplayer/status/2025362800332202290", "media": [], "is_long": true, "topic": "mindset"}, {"id": "2025305476603515079", "bookmark_date": "2026-02-21T22:01:59.920Z", "tweeted_at": "2026-02-21T20:23:48.000Z", "screen_name": "lamxnt", "name": "riley.", "avatar": "https://pbs.twimg.com/profile_images/1846639343248531456/ZvakmOW9_normal.jpg", "text": "Claude Code (in VS Code) as home base\n\nGHL API v2 - custom MCP\nWhop MCP\nCloudflare MCP\nMeta ads MCP\nGemini + X API (deep research)\nCustom python agent + Nano Banana\n\n+ custom Claude Skills for copywriting, landing page design, etc\n\nI can:\n\n- Have Gemini + X do deep research\n- Claude writes TSL (foundation for offer)\n- Claude builds landing page, integrates GHL HTML form\n- Whop MCP creates product + integrates checkout into funnel (+ fires webhooks to GHL for CRM\n- Installs meta pixel\n- Nano banana generates static ad creatives\n- Claude writes ad copy, uploads to ads manager + ad creatives\n- Syncs up with Whop API to make sure event match score is 8.5+\n- Launches campaign \n\nCan also handle Microsoft clarity and G4A for tracking. I\u2019m sure Hyros would be easy sync here too\n\nSaaS is dead, democratization of API access is basically letting us build super SaaS\n\nNext step is figuring out Figma MCP -> Claude -> GHL form + Whop checkout for really great funnel design", "tweet_url": "https://x.com/lamxnt/status/2025305476603515079", "media": [], "is_long": true, "topic": "ai"}, {"id": "2025297667463446958", "bookmark_date": "2026-02-21T20:20:03.164Z", "tweeted_at": "2026-02-21T19:52:46.000Z", "screen_name": "RyanClogg", "name": "Ryan Clogg", "avatar": "https://pbs.twimg.com/profile_images/1896353952645419008/oxbjeK8s_normal.jpg", "text": "AI Marketers,\n\n- Sales Pages / Order Forms\n- Listicles / Advertorials\n- Image &amp; Video Ads \n- Tracking\n- CRM &amp; Follow Ups\n- Email/SMS/Dials\n- Hosting\n- Design\n- Split Testing\n\nWhat tech stack are you currently using? \u2b07\ufe0f\u2b07\ufe0f\u2b07\ufe0f\n\nComment links, examples, etc.\n\nRT so we can crowdsource.", "tweet_url": "https://x.com/RyanClogg/status/2025297667463446958", "media": [{"type": "gif", "url": "https://video.twimg.com/tweet_video/HBtNfiCXUAAwVC4.mp4", "thumb": "https://pbs.twimg.com/tweet_video_thumb/HBtNfiCXUAAwVC4.jpg"}], "is_long": true, "topic": "ads"}, {"id": "2025219068341477384", "bookmark_date": "2026-02-21T22:09:28.164Z", "tweeted_at": "2026-02-21T14:40:27.000Z", "screen_name": "amyoder", "name": "Adam Yoder", "avatar": "https://pbs.twimg.com/profile_images/1917748923894022144/PewMm2U9_normal.jpg", "text": "@NickHintonn It\u2019s more the fact that someone who *could* do these drugs are either very rich or very poor, so they have a LOT of time on their hands and starting asking themselves non-survivalist questions and start seeking more creative answers to life", "tweet_url": "https://x.com/amyoder/status/2025219068341477384", "media": [], "is_long": false, "topic": "mindset"}, {"id": "2025143407853592849", "bookmark_date": "2026-02-22T06:27:45.077Z", "tweeted_at": "2026-02-21T09:39:48.000Z", "screen_name": "thebeautyofsaas", "name": "BOSS", "avatar": "https://pbs.twimg.com/profile_images/2012506138550349824/H7NOzq7E_normal.jpg", "text": "Would highly recommend everyone to pick this one \n\n&gt;fas 6:26:07.000Z", "screen_name": "yourealazyfvck", "name": "David", "avatar": "https://pbs.twimg.com/profile_images/1890296376933621760/9HyVO3LQ_normal.jpg", "text": "This used to be the consensus but this is absolutely wrong when dealing with paid traffic\n\nCold paid traffic you need to throw them in the funnel IMMEDIATELY because you\u2019re trying to get a response. Also known as Direct Response.\n\nYou\u2019re talking to the 5% of the 5% of people who even read past headline or the hook/drop off point on the VSL.\n\nOn organic, you have the luxury of \u201cnurturing\u201d them with content and lead magnets, and all of that shit because you aren\u2019t paying for traffic and you\u2019re selling through evergreen content assets.\n\nThe biggest guys in info run two funnels:\n\n1 - direct to vsl\n2 - webinar optin to webinar for call booking / straight to checkout on a $1-2k course that they break even on or go negative on since the CAC is super high\n\nActually, this works even BETTER on B2B traffic in specific niche markets because they\u2019re not exposed to course sellers and internet marketing tactics outside of your run of the mill agency kid running a \u201cGet you 100 clients in the next 30 minutes or you don\u2019t pay and I\u2019ll suck you off\u201d offer\n\nIf you spend a few grand on B2B using DR principles and speak directly to ICP pain points you\u2019re essentially guaranteed profitability with enough reach and impressions, especially on an Optin -> VSL -> Book a Call funnel.\n\nBoth of these different customer profiles are attacked and marketed to in 2 incredibly different ways on the front end.\n\nThe long form VSL exists as the trust builder. Cold paid engages with your TOF and you immediately retarget them everywhere shoving all of your MOF content down their throat (like they\u2019re a follower of yours on organic).\n\nSince you\u2019re PAYING for traffic, you need them to convert as fast as possible so you do not pull any punches whatsoever in your sales process.\n\nTraffic + Offer = Cash.\n\nHope this helps.", "tweet_url": "https://x.com/yourealazyfvck/status/2021833173508952540", "media": [], "is_long": true, "topic": "ads"}, {"id": "2021769464279138785", "bookmark_date": "2026-02-15T12:28:20.255Z", "tweeted_at": "2026-02-12T02:12:57.000Z", "screen_name": "cornski", "name": "Corn \u2727\u2363", "avatar": "https://pbs.twimg.com/profile_images/1646213816084987913/riQEthlg_normal.jpg", "text": "the secret to life is to literally jus start movin like dis", "tweet_url": "https://x.com/cornski/status/2021769464279138785", "media": [], "is_long": false, "topic": "vibes"}, {"id": "2021614957582745929", "bookmark_date": "2026-02-11T17:31:42.208Z", "tweeted_at": "2026-02-11T15:59:00.000Z", "screen_name": "msnrhu", "name": "Mason Hughes", "avatar": "https://pbs.twimg.com/profile_images/1978424744773865472/nn3NX-En_normal.jpg", "text": "Before Ye got nerfed", "tweet_url": "https://x.com/msnrhu/status/2021614957582745929", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/HAKhvzLXkAAK_fN.png"}], "is_long": false, "topic": "music"}, {"id": "2021435299952562242", "bookmark_date": "2026-02-11T13:45:51.086Z", "tweeted_at": "2026-02-11T04:05:06.000Z", "screen_name": "anothercohen", "name": "Alex Cohen", "avatar": "https://pbs.twimg.com/profile_images/1886413225786232832/CjFMSLAg_normal.jpg", "text": "This is the most autistic thing I've ever vibe coded. \n\nA Mac app that turns your wallpaper into a 3D Earth view with day/night depending on where in the world you are. Can toggle:\n* Weather\n* Live flights\n* Zoomed views\n* Pollen/Air Quality\n* Globe spin\n\nShould I publish it?", "tweet_url": "https://x.com/anothercohen/status/2021435299952562242", "media": [{"type": "video", "url": "https://video.twimg.com/amplify_video/2021434320284512256/vid/avc1/2984x1790/9ZSawd9e_iAO4m7x.mp4?tag=21", "thumb": "https://pbs.twimg.com/amplify_video_thumb/2021434320284512256/img/pD6ffprtFxib8n8x.jpg", "duration": 78475, " s.twimg.com/amplify_video_thumb/2019835302768967680/img/Uah_2kEpQrh9wQPT.jpg", "duration": 28150, "aspect": [9, 16]}], "is_long": false, "topic": "ai"}, {"id": "2019820382497145100", "bookmark_date": "2026-02-06T22:12:44.431Z", "tweeted_at": "2026-02-06T17:08:00.000Z", "screen_name": "NavalQuotes247", "name": "Naval Quotes", "avatar": "https://pbs.twimg.com/profile_images/1350932012073447432/t-UGBlGF_normal.jpg", "text": "\"Asymmetric opportunities:\n\nInvest in startups\nStart a company\nCreate a book, podcast, video\nCreate a (software) product\nGo on many first dates\nGo to a cocktail party\nRead a Lindy book\nMove to a big city\nBuy Bitcoin\nTweet.\"\n\n@naval", "tweet_url": "https://x.com/NavalQuotes247/status/2019820382497145100", "media": [], "is_long": false, "topic": "ads"}, {"id": "2019797250617082015", "bookmark_date": "2026-02-06T20:55:03.196Z", "tweeted_at": "2026-02-06T15:36:05.000Z", "screen_name": "codyplof", "name": "Cody Plofker", "avatar": "https://pbs.twimg.com/profile_images/1963408271433232384/7v-Lo99o_normal.jpg", "text": "Has anyone figured out how to get web design systems into claude code? \n\nI don't need production ready, but it would be great for mockups and protytypes to match our live site a bit better.", "tweet_url": "https://x.com/codyplof/status/2019797250617082015", "media": [], "is_long": false, "topic": "ai"}, {"id": "2019790492834152612", "bookmark_date": "2026-02-06T22:14:08.115Z", "tweeted_at": "2026-02-06T15:09:14.000Z", "screen_name": "LucaDaCorte", "name": "Luca Da Corte", "avatar": "https://pbs.twimg.com/profile_images/1738618145953218560/dj4q-XR7_normal.jpg", "text": "\u201cFramer is so easy that anybody from the marketing team can build pages with it!\u201d\n\nThat sounds cool in theory until you see what happens on real projects when there\u2019s nobody overseeing the process:\n\n- Pages drifting away from the style\n\n- Mobile view is often overlooked and broken\n\n- Component dependencies being ignored, with changes in one place affecting dozens of other pages\n\nNow, is the solution going back to a slower process where everything goes through one or two people?\n\nNah.\n\nInstead, what I like to do is:\n\n1. Build 20\u201330 on-brand section components that people can use to spin up new pages quickly, while staying consistent and responsive\n\n2. Record short documentation videos for workflows I know will be used all the time (especially CMS-related ones)\n\n3. Leave notes, comments, and descriptions - never assume a skilled dev will always be the one touching the project\n\nIs it more work upfront? Yes.\n\nDo pre-made sections feel a bit restrictive? Sometimes.\n\nBut overall, it\u2019s a net-positive tradeoff - and one that\u2019s worth discussing and implementing, especially if the team plans to scale the site themselves.", "tweet_url": "https://x.com/LucaDaCorte/status/2019790492834152612", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/HAe8gAbXkAArifR.png"}], "is_long": true, "topic": "design"}, {"id": "2019787951530725396", "bookmark_date": "2026-02-06T19:35:26.691Z", "tweeted_at": "2026-02-06T14:59:08.000Z", "screen_name": "EXM7777", "name": "Machina", "avatar": "https://pbs.twimg.com/profile_images/1922574051580563456/-OFXIxnm_normal.jpg", "text": "https://t.co/j3AA90tjxQ", "tweet_url": "https://x.com/EXM7777/status/2019787951530725396", "media": [], "is_long": false, "topic": "design"}, {"id": "2019616841086411084", "bookmark_date": "2026-02-06T22:21:37.381Z", "tweeted_at": "2026-02-06T03:39:12.000Z", "screen_name": "battleangelviv", "name": "Viv \ud83e\udea9", "avatar": "https://pbs.twimg.com/profile_images/2020914234645938177/WusMdBpJ_normal.jpg", "text": "X has the highest concentration of smart people and those who are great at what they do  \n\nyou won\u2019t find this kind of industry knowledge + insights from key decision makers/leadership of the world\u2019s most interesting companies on any other platform", "tweet_url": "https://x.com/battlean ted_at": "2026-01-08T22:34:41Z", "screen_name": "_TUNK", "name": "TUNK", "avatar": "https://pbs.twimg.com/profile_images/1892164993442869248/iAkI8liF_normal.jpg", "text": "how to structure the 3 minute VSL youtube ad\n\nyou could probably copy + paste this into any LLM and it will put out a killer script\n\nbig claim + market reframe\n&gt; open with a claim that reframes the entire category as dangerous or broken\n\nexternal authority borrowing\n&gt; borrow", "tweet_url": "https://x.com/_TUNK/status/2009393349367673304", "media": [], "topic": "ads"}, {"id": "2009309696490934312", "bookmark_date": "2026-03-01T16:49:09.856Z", "tweeted_at": "2026-01-08T17:02:17Z", "screen_name": "JohnCena", "name": "John Cena", "avatar": "https://pbs.twimg.com/profile_images/1589730936161198081/UDs446vn_normal.jpg", "text": "New cars, new guests, new conversations!\nWe continue to search for the answer to #WhatDrivesYou with new episodes streaming for FREE on @therokuchannel starting January 16! https://t.co/Dh05rIry3p", "tweet_url": "https://x.com/JohnCena/status/2009309696490934312", "media": [{"type": "video_thumb", "url": "https://video.twimg.com/amplify_video/2009309611434680320/vid/avc1/1920x1080/RzvuOrL_RMIKbwCh.mp4?tag=21", "tweet_url": "https://twitter.com/JohnCena/status/2009309696490934312"}], "topic": "vibes"}, {"id": "2008938877021769886", "bookmark_date": "2026-03-01T16:49:09.856Z", "tweeted_at": "2026-01-07T16:28:47Z", "screen_name": "yegormethod", "name": "Yegor", "avatar": "https://pbs.twimg.com/profile_images/1966342439683436545/QVZWtHbx_normal.jpg", "text": "never ask \"what's your budget\"\n\nask \"what did you pay your last guy\"\n\n\"3k\"\n\n\"and how'd that work out for you\"\nthey say it sucked\n\ni say \"cool so you know cheap doesn't work. i'm 8k. you in or you wanna waste another year with budget bullshit\"\n\nclosed 6 deals w/ this lol", "tweet_url": "https://x.com/yegormethod/status/2008938877021769886", "media": [], "topic": "ads"}, {"id": "2008906931671327172", "bookmark_date": "2026-03-01T16:49:09.856Z", "tweeted_at": "2026-01-07T14:21:50Z", "screen_name": "eptwts", "name": "EP", "avatar": "https://pbs.twimg.com/profile_images/1809917776816951296/yEZO6kNW_normal.jpg", "text": "you're always 1 idea, 1 connection, or 1 impulsive decision away from an event that'll snowball into you living the life that you wanna live...\n\nthe best thing you can do to maximize your chances of such an event occuring are to:\n&gt; keep learning like you're still a beginner at", "tweet_url": "https://x.com/eptwts/status/2008906931671327172", "media": [], "topic": "mindset"}, {"id": "2008550459230097528", "bookmark_date": "2026-03-01T16:49:09.856Z", "tweeted_at": "2026-01-06T14:45:21Z", "screen_name": "singher_14", "name": "Y\ud835\udc1a\ud835\udc2c\ud835\udc21", "avatar": "https://pbs.twimg.com/profile_images/1982874749685362688/vzT_uRTm_normal.jpg", "text": "What are these hidden cryptic hints in the Doomsday clock down?\n\nThree Teasers, different messages.\n#AvengersDoomsday https://t.co/gdjnzF0b5f", "tweet_url": "https://x.com/singher_14/status/2008550459230097528", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/G9_NqpGbsAEHu1S.jpg\nhttps://pbs.twimg.com/media/G9_NqqIbcAAwPLE.jpg\nhttps://pbs.twimg.com/media/G9_NqqSbcAIxWHX.jpg"}], "topic": "rabbit hole"}, {"id": "2008454656632991897", "bookmark_date": "2026-03-01T16:49:09.856Z", "tweeted_at": "2026-01-06T08:24:40Z", "screen_name": "copywriter_adam", "name": "Adam Papp", "avatar": "https://pbs.twimg.com/profile_images/1969392792217530368/nfETYI3s_normal.jpg", "text": "At some point as a copywriter, you're going to start to write ads...\n\nAnd you NEED to learn how to think visually. \n\nFrom what I've seen working together with a lot of copywriters is that they suck at thinking visually. \n\nSo all they do when they write an ad is they just write", "tweet_url": "https://x.com/copywriter_adam/status/2008454656632991897", "media": [], "topic": "ads"}, {"id": "2008393835978629136", "bookmark_date": "2026-03-01T16:49:09.856Z", "tweeted_at": "2026-01-06T04:22:59Z", "screen_name": "joshdgavin", "name": "Joshua Gavin", "avatar": "https://pbs.twimg.com/profile_images/1969562984771903488/J3sFuiEE_normal.jpg", "text": "Sadly most info business only moat is their sales process hence why people are secretive of their offers and funnels.\n\nThe other only real moat is the guru or expert and the parasocial\nrelationship with their audience.\n\nEverything else can be copied, modeled or stolen by", "tweet_url": "https://x.com/joshdgavin/status/2008393835978629136", "media": [], "topic": "ads"}, {"id": "2008357914046583209", "bookmark_date": "2026-03-01T16:49:09.856Z", "tweeted_at": "2026-01-06T02:00:14Z", "screen_name": "evanseech", "name": "Evan Seech | Ads & Funnels", "avatar": "https://pbs.twimg.com/profile_images/1911577438217244672/CB0Ogshn_normal.jpg", "text": "\"Will you be pitching anything?\"\n\n90% of you are terrified to address this.\n\nThinking transparency will hurt conversions.\n\nDEAD wrong.\n\nWhat actually happens when you add this FAQ:\n\n\u2022 People's guards drop instantly\n\u2022 Trust shoots through the roof\n\u2022 Show rates increase by", "tweet_url": "https://x.com/evanseech/status/2008357914046583209", "media": [], "topic": "ads"}, {"id": "2008182818732724651", "bookmark_date": "2026-03-01T16:49:21.922Z", "tweeted_at": "2026-01-05T14:24:28Z", "screen_name": "theoldfilipaf", "name": "Filip AF", "avatar": "https://pbs.twimg.com/profile_images/1897285143481442304/ZXykesvi_normal.jpg", "text": "2020: Chubby, no drive, probably gay as well\n\n2021: Skinny, some drive, maybe gay as well\n\n2022: Official gym addict, fuck ton of drive, definitely not gay anymore\n\n2023: Binging business content\n\n2024: First tweet\n\n2025: First dollar online\n\n2026: First $10k month? https://t.co/xTH3xYFQvI", "tweet_url": "https://x.com/theoldfilipaf/status/2008182818732724651", "media": [{"type": "photo", "url": "https://pbs.twimg.co r a deeper mission. Or something you're actually good at. But making 'money' as a byproduct", "tweet_url": "https://x.com/zzarakkk/status/1982157069009744122", "media": [], "topic": "mindset"}, {"id": "1981783108086100021", "bookmark_date": "2026-03-01T16:51:16.828Z", "tweeted_at": "2025-10-24T18:01:27Z", "screen_name": "ItsLeonBekteshi", "name": "Leon Bekteshi \ud83c\udde6\ud83c\uddf1", "avatar": "https://pbs.twimg.com/profile_images/1780863500807528448/7-5A636b_normal.jpg", "text": "Every copywriter should do this:\n\nWake up. \n\nDrink coffee.\n\nLock yourself in your room.\n\nGo on IG, YT or X.\n\nFind a person with an offer.\n\nWrite them a VSL, Opt-in Page, Lead for sales page, or email.\n\nPut in a doc.\n\nSend it to them.\n\nMake a plan further.\n\nThat's how you practice", "tweet_url": "https://x.com/ItsLeonBekteshi/status/1981783108086100021", "media": [], "topic": "ads"}, {"id": "1981359539719897516", "bookmark_date": "2026-03-01T16:51:16.828Z", "tweeted_at": "2025-10-23T13:58:20Z", "screen_name": "lamxnt", "name": "riley.", "avatar": "https://pbs.twimg.com/profile_images/1846639343248531456/ZvakmOW9_normal.jpg", "text": "FLAMING hot take:\n\nWe MIGHT be leaving the era of \"ugly funnels convert better\"\n\nSeeing a LOT of the top (albeit guru-led offers) using proper Framer / Webflow sites\n\nThe market was trained on ugly = authentic = trustworthy. But every single guru is competing on authenticity, raw", "tweet_url": "https://x.com/lamxnt/status/1981359539719897516", "media": [], "topic": "ads"}, {"id": "1981274743719317979", "bookmark_date": "2026-03-01T16:51:16.828Z", "tweeted_at": "2025-10-23T08:21:23Z", "screen_name": "darwintakesover", "name": "Darwin", "avatar": "https://pbs.twimg.com/profile_images/1999283586290298880/UWOh371M_normal.jpg", "text": "ok mf this shit makes no sense and all your \"tips\" were generated by AI\n\nthat's the type of advice i saw back in 2020 in a leaked hustlers university course\n\nkeep following this virgin advice an ga,\n\nIf you want to run cold outbound you need to have a front-end offer.  \n\nCold traffic does not want to buy Cyber Security or a CRM Optimization.  \n\nPitch something of immediate value.", "tweet_url": "https://x.com/levikmunneke/status/1975629200175603766", "media": [], "topic": "ads"}, {"id": "1975291467598889128", "bookmark_date": "2026-03-01T16:51:40.807Z", "tweeted_at": "2025-10-06T20:05:59Z", "screen_name": "benjaminprinter", "name": "Mitch", "avatar": "https://pbs.twimg.com/profile_images/1833174667881811968/VBllgPhs_normal.jpg", "text": "Alright mfs, I built a 16-page doc on how to craft a 7-figure/year B2B offer \n\n(even if you don\u2019t have a single case study yet)\n\nIt\u2019s the same protocol we used to close 9-figure clients like Mashreq Bank &amp; HSBC \n\nIt covers : \n\n- Hypothesis design \n- Positioning logic \n-", "tweet_url": "https://x.com/benjaminprinter/status/1975291467598889128", "media": [], "topic": "ads"}, {"id": "1975259264710287470", "bookmark_date": "2026-03-01T16:51:40.807Z", "tweeted_at": "2025-10-06T17:58:01Z", "screen_name": "b_winzer", "name": "Ben Winzer", "avatar": "https://pbs.twimg.com/profile_images/1949503589891620864/cy80e1xE_normal.jpg", "text": "STOP PUTTING YOUR MISSION STATEMENT ON YOUR MAIN PAGE BRO.\n\nPLEASE.\n\nI JUST AUDITED 2 WEBSITES AND BOTH HAD THEIR MISSION ON THERE.\n\nBRO NOOOOOBOOODYYY CARES ABOUT THAT.\n\nLITERALLY NO ONE.\n\nDO YOU THINK A RANDOM STRANGER CARES HOW MUCH CALORIES YOU CONSUMED ON TUESDAY 2 WEEKS", "tweet_url": "https://x.com/b_winzer/status/1975259264710287470", "media": [], "topic": "ads"}, {"id": "1975252311841649109", "bookmark_date": "2026-03-01T16:50:41.893Z", "tweeted_at": "2025-10-06T17:30:24Z", "screen_name": "TheInfoLegend", "name": "KB", "avatar": "https://pbs.twimg.com/profile_images/1967073620376555520/oPoEPoNo_normal.jpg", "text": "this time instead of improving the hero section (it was already perfect),\n\ni redesigned @ravikabir_'s step section.\n\n- optimised it f pbs.twimg.com/profile_images/1917748923894022144/PewMm2U9_normal.jpg", "text": "BOOKMARK THIS SH*T \n\nIf i was working a 9-5 and my goal was to completely change my life with Pay Per call, this is exactly what I would do to get there in the shortest possible timeframe \n(6 months)\n\nMonth 1 - \nI would go on YouTube and go through the ringba Pay per call", "tweet_url": "https://x.com/amyoder/status/1973776009049616623", "media": [], "topic": "ads"}, {"id": "1973556267089277058", "bookmark_date": "2026-03-01T16:51:54.030Z", "tweeted_at": "2025-10-02T01:10:55Z", "screen_name": "AbyssusErigo", "name": "Abyssus", "avatar": "https://pbs.twimg.com/profile_images/1751075981098405888/oUyfMkLR_normal.jpg", "text": "The Psychological Paradigm of Writing A+ Copy with AI:\n\nI'm getting lots of DMs of people asking how to get Claude to spin out good copy.\n\nBut 9/10 times the actual problem is deeper.\n\nMost people think they can just talk to a chatbot and get back some legendary ass copy. https://t.co/HRXOV5OAsJ", "tweet_url": "https://x.com/AbyssusErigo/status/1973556267089277058", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/G2N69xzaIAUqDYG.jpg"}], "topic": "ads"}, {"id": "1973379785096044714", "bookmark_date": "2026-03-01T16:51:54.030Z", "tweeted_at": "2025-10-01T13:29:39Z", "screen_name": "cash_collectr", "name": "Kian", "avatar": "https://pbs.twimg.com/profile_images/1927401437362855938/96uze_fN_normal.jpg", "text": "Jordan Peterson launched a course\nIt flopped harder than a fat chick on a diving board.\n\nHere's what actually happened:\n\nThe Promise:\n\n- $200-300/year courses (way cheaper than university)\n\n- Accredited courses that transfer to real degrees\n\n- Star faculty: Peterson, Bret", "tweet_url": "https://x.com/cash_collectr/status/1973379785096044714", "media": [], "topic": "ads"}, {"id": "1973087620700991535", "bookmark_date": "2026-03-01T16:51:54.030Z", "tweeted_at": "2025-09-30T18:08:41Z", "screen_name": "maciekl_", "name": "Maciek Lipa", "avatar": "https://pbs.twimg.com/profile_images/2009030447217479681/vq1EJr9O_normal.jpg", "text": "If you're struggling to sign clients, stop looking for a new 'magical' script\n\nYou don't need another script. You need to clean your inner world\n\n90% of client acquisition is having MAXIMUM conviction in your service &amp; developing the \"I'm worthy\" mindset that allows you to", "tweet_url": "https://x.com/maciekl_/status/1973087620700991535", "media": [], "topic": "mindset"}, {"id": "1972472887870394568", "bookmark_date": "2026-03-01T16:51:54.030Z", "tweeted_at": "2025-09-29T01:25:57Z", "screen_name": "AbyssusErigo", "name": "Abyssus", "avatar": "https://pbs.twimg.com/profile_images/1751075981098405888/oUyfMkLR_normal.jpg", "text": "This one weird lesson I learned from Hollywood actors turned me into a 10x better copywriter.\n\n(this is a headline, but I'm actually not joking)\n\nHave you heard of method acting?\n\nMethod acting is an approach to performance where actors draw upon their own emotions, memories, and https://t.co/gfCaMhT3AH", "tweet_url": "https://x.com/AbyssusErigo/status/1972472887870394568", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/G1-hoyNaQAAl9-_.jpg"}], "topic": "ads"}, {"id": "1972458426736218428", "bookmark_date": "2026-03-01T16:51:54.030Z", "tweeted_at": "2025-09-29T00:28:30Z", "screen_name": "whothefukisleo", "name": "Leonardo", "avatar": "https://pbs.twimg.com/profile_images/1911266040173989888/0NXdH5ds_normal.jpg", "text": "Great marketers understand that you can use large affiliate teams to destroy competition &amp; completely ruin your biggest haters careers.\n\nFor those confused, here\u2019s the exact strategy we used to keep our reputation at Cobratate bulletproof:\n\u2028Every few weeks, we\u2019d get celebrities, https://t.co/QWnE1ozYdp", "tweet_url": "https://x.com/whothefukisleo/status/1972458426736218428", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/G1-UU_tXoAAgqD9.jpg\nhttps:/ : "ads"}, {"id": "1965792391748792668", "bookmark_date": "2026-03-01T16:53:12.529Z", "tweeted_at": "2025-09-10T15:00:03Z", "screen_name": "CarlWeische", "name": "Carl Weische", "avatar": "https://pbs.twimg.com/profile_images/1991891008250908672/NK1KDDMz_normal.jpg", "text": "How brands scale to $1m/month using Hybrid Product Pages: https://t.co/nln8eHqgYN", "tweet_url": "https://x.com/CarlWeische/status/1965792391748792668", "media": [{"type": "video_thumb", "url": "https://video.twimg.com/amplify_video/1953796876903268352/vid/avc1/1920x1080/fuU3KFP7KQhv0TDD.mp4?tag=21", "tweet_url": "https://twitter.com/CarlWeische/status/1965792391748792668"}], "topic": "ads"}, {"id": "1965773223397872047", "bookmark_date": "2026-03-01T16:53:12.529Z", "tweeted_at": "2025-09-10T13:43:53Z", "screen_name": "MEvsIRS", "name": "neverpaytax", "avatar": "https://pbs.twimg.com/profile_images/1950590657363423233/Sj0X4icF_normal.jpg", "text": "If I\u2019m not in your feed it\u2019s probably because you\u2019re a btch nigga https://t.co/BmN7Jw5FPH", "tweet_url": "https://x.com/MEvsIRS/status/1965773223397872047", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/G0fUU-racAExP_1.jpg"}], "topic": "ads"}, {"id": "1965529428529918408", "bookmark_date": "2026-03-01T16:53:12.529Z", "tweeted_at": "2025-09-09T21:35:08Z", "screen_name": "sambooneee", "name": "SAM", "avatar": "https://pbs.twimg.com/profile_images/2007313090308927488/prn_uiQ-_normal.jpg", "text": "What monthly income comes to mind when I say financial freedom?", "tweet_url": "https://x.com/sambooneee/status/1965529428529918408", "media": [], "topic": "mindset"}, {"id": "1965454158502216061", "bookmark_date": "2026-03-01T16:53:12.530Z", "tweeted_at": "2025-09-09T16:36:02Z", "screen_name": "stronger_ads", "name": "Eugene Schwartzenegger", "avatar": "https://pbs.twimg.com/profile_images/1934408530746122240/cB4HmtQK_normal.jpg", "text": "The best advice on writing headlines I ever received was to follow the 4 U's.\n\nThat means, make sure the headlines are:\n\nUrgent\nUnique\nUltra-specific\nUseful\n\nYou may not get all of them, but try to get at least 3.\n\nI've used this advice to write headlines, subject lines, and help", "tweet_url": "https://x.com/stronger_ads/status/1965454158502216061", "media": [], "topic": "ads"}, {"id": "1965452885816213945", "bookmark_date": "2026-03-01T16:53:12.530Z", "tweeted_at": "2025-09-09T16:30:58Z", "screen_name": "lamxnt", "name": "riley.", "avatar": "https://pbs.twimg.com/profile_images/1846639343248531456/ZvakmOW9_normal.jpg", "text": "Here's a perfect example of this from @giovanni_romero \n\nDon't complicate the sales messaging if going B2B. Just be explicitly clear on the outcome, the benefits of that outcome, and why your solution is better than other options (doing it themselves, hiring a worse {competitor https://t.co/t2EzMj8iWF", "tweet_url": "https://x.com/lamxnt/status/1965452885816213945", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/G0awmq5XgAEhF1a.jpg\nhttps://pbs.twimg.com/media/G0awm0IXgAAjnro.jpg"}], "topic": "ads"}, {"id": "1965422104964211168", "bookmark_date": "2026-03-01T16:53:12.530Z", "tweeted_at": "2025-09-09T14:28:40Z", "screen_name": "copywriter_adam", "name": "Adam Papp", "avatar": "https://pbs.twimg.com/profile_images/1969392792217530368/nfETYI3s_normal.jpg", "text": "Yesterday I read through 50 VSL's from 50 different copywriters...\n\nAnd the skill gap is MASSIVE.\n\nWith some writers, I was instantly hooked and smiled while reading through the copy.\n\nWith some writers, after the 2nd line I knew that this was poor copy...\n\nSo what makes the BIG", "tweet_url": "https://x.com/copywriter_adam/status/1965422104964211168", "media": [], "topic": "ads"}, {"id": "1964222283104604632", "bookmark_date": "2026-03-01T16:53:24.811Z", "tweeted_at": "2025-09-06T07:01:00Z", "screen_name": "ravikabir_", "name": "Ravi Kabir", "avatar": "https://pbs.twimg.com/profile_images/1961638590359703553/TUFw_azC_normal.jpg", "text": "Most high-ticket businesses run 5-8 offers at once:\n\n$17 ebook, $97 webinar, $250 consult, $1500 downsell, $9k full service\u2026\n\nMeanwhile the SaaS industry is stuck with the same 3 plans.\n\nThat\u2019s why it\u2019s harder to profit:\n\nYou\u2019re ignoring customers who want to spend MORE.\n\nThink", "tweet_url": "https://x.com/ravikabir_/status/1964222283104604632", "media": [], "topic": "ads"}, {"id": "1964014678759150042", "bookmark_date": "2026-03-01T16:53:24.811Z", "tweeted_at": "2025-09-05T17:16:03Z", "screen_name": "PaulNiklas8", "name": "Paul Niklas", "avatar": "https://pbs.twimg.com/profile_images/1946944184838979584/eBzzBmcD_normal.jpg", "text": "Money twitter really good for tactical knowledge, can just brute force your way to 7 to low 8 figure net worth using a lot of it.\n\nBut if you can blend the tactical/dark arts with more traditional MBA style business skills, there\u2019s a lot of money to be made.", "tweet_url": "https://x.com/PaulNiklas8/status/1964014678759150042", "media": [], "topic": "mindset"}, {"id": "1963990693036044458", "bookmark_date": "2026-03-01T16:53:24.811Z", "tweeted_at": "2025-09-05T15:40:45Z", "screen_name": "stronger_ads", "name": "Eugene Schwartzenegger", "avatar": "https://pbs.twimg.com/profile_images/1934408530746122240/cB4HmtQK_normal.jpg", "text": "\ud83e\uddf5THREAD OF WINNING LEADS\n\nIf you want to give your VSL or Promotion the best shot at working\u2026\n\nYour lead should have a clear \u201cwhat\u2019s in it for me\u201d by line 5 or 6 (preferably line 3).\n\nIt can be a promise, an anti-promise, or anything in between.\n\nBut it needs to give your", "tweet_url": "https://x.com/stronger_ads/status/1963990693036044458", "media": [], "topic": "mindset"}, {"id": "1963923572293820522", "bookmark_date": "2026-03-01T16:50:53.704Z", "tweeted_at": "2025-09-05T11:14:02Z", "screen_name": "TheInfoLegend", "name": "KB", "avatar": "https://pbs.twimg.com/profile_images/1967073620376555520/oPoEPoNo_normal.jpg", "text": "I did it once again. \n\nI redesigned the landing page I made for @JaceEngland1 a few weeks ago\n\nThis time, I added more details and put more time into it. \nStill the copy sucks because I don't know his exact offer.\n\nIf you want the exact landing page for your offer, shoot me a DM. https://t.co/I2UO7ZDo6p", "tweet_url": "https://x.com/TheInfoLegend/status/1963923572293820522", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/G0FCFH3WUAAwsgm.jpg\nhttps://pbs.twimg.com/media/G0FCFLcWQAAf3Hn.jpg"}], "topic": "ads"}, {"id": "1963697842297700572", "bookmark_date": "2026-03-01T16:53:24.811Z", "tweeted_at": "2025-09-04T20:17:04Z", "screen_name": "ron_ecomm", "name": "ron | e-comm & operating", "avatar": "https://pbs.twimg.com/profile_images/1432205112840110080/u_dT4eue_normal.jpg", "text": "This is your funnel strategy until you hit 8 figs\n\n1. Go to ChatGPT and ask it to provide a comprehensive market analysis and segmentation based on key avatars. Must source actual industry reports.\n\n2. Use your gut and choose 1 avatar that has the best brand-product-market fit.", "tweet_url": "https://x.com/ron_ecomm/status/1963697842297700572", "media": [], "topic": "ads"}, {"id": "1963421257057407022", "bookmark_date": "2026-03-01T16:53:24.811Z", "tweeted_at": "2025-09-04T01:58:00Z", "screen_name": "mrexits", "name": "prayingforexits \ud83c\udff4\u200d\u2620\ufe0f", "avatar": "https://pbs.twimg.com/profile_images/1639756826400137216/pbjm_VCc_normal.jpg", "text": "A friendly reminder https://t.co/9upmCpkUHy", "tweet_url": "https://x.com/mrexits/status/1963421257057407022", "media": [{"type": "video_thumb", "url": "https://video.twimg.com/amplify_video/1963421178972049408/vid/avc1/720x670/uJuR3JGlyBcae3n4.mp4?tag=21", "tweet_url": "https://twitter.com/mrexits/status/1963421257057407022"}], "topic": "rabbit hole"}, {"id": "1963255906252030334", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-09-03T15:00:58Z", "screen_name": "lamxnt", "name": "riley.", "avatar": "https://pbs.twimg.com/profile_images/1846639343248531456/ZvakmOW9_normal.jpg", "text": "Also, this is something I\u2019ve talked about forever now so apologies for sounding like a broken record\n\nBut I originally learned this from Sam Ovens\u2019s early videos:\n\nIf you make money from your business, and it\u2019s a skill/knowledge based business, you can\u2019t just stop doing the thing", "tweet_url": "https://x.com/lamxnt/status/1963255906252030334", "media": [], "topic": "ads"}, {"id": "1963255444664696872", "bookmark_date": "2026-03-01T16:53:24.811Z", "tweeted_at": "2025-09-03T14:59:08Z", "screen_name": "evanseech", "name": "Evan Seech | Ads & Funnels", "avatar": "https://pbs.twimg.com/profile_images/1911577438217244672/CB0Ogshn_normal.jpg", "text": "At 17, I had no idea what I was doing in marketing. \n\nI straight up landed my first 3 clients with pizza memes.\n\nHow that happened\u2026\n\nEveryone told my parents:\n\n\u201cYour restaurant NEEDS more foot traffic.\u201d\n\nI called cap.\n\nInstead of flyers or coupons, I pitched them on running https://t.co/1wVFrGOm4p", "tweet_url": "https://x.com/evanseech/status/1963255444664696872", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/Gz7iY_9W0AAXOHO.png"}], "topic": "ads"}, {"id": "1963172130192863427", "bookmark_date": "2026-03-01T16:53:24.811Z", "tweeted_at": "2025-09-03T09:28:04Z", "screen_name": "jasoncfox", "name": "Jason Fox", "avatar": "https://pbs.twimg.com/profile_images/1861731803989528576/wqOgjwsh_normal.jpg", "text": "I got cold DM'd by this guy\n\nNo B.S, actually researched me and my content\n\nI didn't respond, he followed up with out the usual entitlement people on here display, he even sent a video covering some quick tweaks I could make\n\nI replied wanting more info, didn't think much of it", "tweet_url": "https://x.com/jasoncfox/status/1963172130192863427", "media": [], "topic": "ads"}, {"id": "1962880561929654490", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-09-02T14:09:29Z", "screen_name": "stronger_ads", "name": "Eugene Schwartzenegger", "avatar": "https://pbs.twimg.com/profile_images/1934408530746122240/cB4HmtQK_normal.jpg", "text": "Books on copywriting are great, but don\u2019t forget\u2026\n\nThe best way to learn copy is by reading great copy.\n\nWith all of the info and books out there, sometimes it\u2019s easy to lose sight of that.\n\nIn fact, my ratio of winning promos read to copywriting books read is probably close to", "tweet_url": "https://x.com/stronger_ads/status/1962880561929654490", "media": [], "topic": "ads"}, {"id": "1962877287851819259", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-09-02T13:56:28Z", "screen_name": "lamxnt", "name": "riley.", "avatar": "https://pbs.twimg.com/profile_images/1846639343248531456/ZvakmOW9_normal.jpg", "text": "Creators with 100k followers make less than anon accounts with 5k who understand unit economics\n\nThe real money isn't in audience size, it's in understanding LTV vs. cost to acquire. Even with organic\n\nMost creators are basically working for free because they never do the math on", "tweet_url": "https://x.com/lamxnt/status/1962877287851819259", "media": [], "topic": "ads"}, {"id": "1962863329220886689", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-09-02T13:01:00Z", "screen_name": "ravikabir_", "name": "Ravi Kabir", "avatar": "https://pbs.twimg.com/profile_images/1961638590359703553/TUFw_azC_normal.jpg", "text": "You can literally double your close rate with good pre-call sequences.\n\nProbably gets you an extra 50% income too by doing almost nothing\n\nMost SaaS companies:\n\n- Run ads spend like crazy\n- Pray that churn doesn\u2019t screw them over\n- Forced to hop on calls with brokies and tire", "tweet_url": "https://x.com/ravikabir_/status/1962863329220886689", "media": [], "topic": "ads"}, {"id": "1962436401896493152", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-09-01T08:44:33Z", "screen_name": "fromzerotomill", "name": "MONTE", "avatar": "https://pbs.twimg.com/profile_images/2026399103769583616/WqthbC7I_normal.jpg", "text": "How To Get 100+ Positive Testimonials For Your Infoproduct Every Month\n\ni developed the Tactile Method to get tons of happy customers\n\nhere\u2019s the sauce:\n\nthe best infoproducts aren't courses. they're hyper-specific templates and tools\n\n\"notion dashboard for agencies\" beats", "tweet_url": "https://x.com/fromzerotomill/status/1962436401896493152", "media": [], "topic": "ads"}, {"id": "1962262106952061428", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-08-31T21:11:58Z", "screen_name": "AustinGeorgas", "name": "Austin Georgas", "avatar": "https://pbs.twimg.com/profile_images/2024154491143049216/8iwaMSZr_normal.jpg", "text": "As you get older you realize\n\nYou were never battling your environment.\nYou were never battling other people.\nYou were never battling situations.\n\nAt the end of the day, you were only battling your mind.\n\nYou are your own worst enemy.\nYou are your own greatest supporter.\n\nYour", "tweet_url": "https://x.com/AustinGeorgas/status/1962262106952061428", "media": [], "topic": "mindset"}, {"id": "1962153409517076835", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-08-31T14:00:02Z", "screen_name": "AndrewWriteCopy", "name": "Andrew Gould", "avatar": "https://pbs.twimg.com/profile_images/2005441104770998273/DDysmquK_normal.jpg", "text": "18 of my favourite copywriting books:\n\n1) Cash Copy by Dr. Jeffrey Lant\n2) The Brain Audit by Sean D\u2019Souza\n3) Power Copywriting by H.G. Lewis\n4) Take Their Money by Kyle Milligan\n5) Cashvertising by Drew Eric Whitman\n6) Sales Letters That Sizzle by H.G. Lewis\n7) Scientific", "tweet_url": "https://x.com/AndrewWriteCopy/status/1962153409517076835", "media": [], "topic": "ads"}, {"id": "1961854191598477645", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-08-30T18:11:03Z", "screen_name": "lamxnt", "name": "riley.", "avatar": "https://pbs.twimg.com/profile_images/1846639343248531456/ZvakmOW9_normal.jpg", "text": "Great lesson for positioning, especially headlines\n\nLower percieved effort = higher CTR\n\n148-point makes it it seem arduous. I'd rather PAY to get it done fast than get it for free and have it be tons of effort. I'll just watch a YouTube video at that point\n\nVs. INSTANTLY get", "tweet_url": "https://x.com/lamxnt/status/1961854191598477645", "media": [], "topic": "ads"}, {"id": "1961766920715173896", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-08-30T12:24:16Z", "screen_name": "zachpogrob", "name": "\u2229", "avatar": "https://pbs.twimg.com/profile_images/2004948994296881152/FYDXU1K0_normal.png", "text": "Make stuff that people:\n\n- Take pictures of\n- Post pictures of\n- Tell all their friends about b/c it makes them look cool/smart/early to things\n\nVery very simple\nVery very hard", "tweet_url": "https://x.com/zachpogrob/status/1961766920715173896", "media": [], "topic": "mindset"}, {"id": "1961630349315973355", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-08-30T03:21:35Z", "screen_name": "JerichoPayments", "name": "Jericho", "avatar": "https://pbs.twimg.com/profile_images/2001383855282905088/tDXkBI0i_normal.jpg", "text": "Ayo croski, I know you think Stripe\u2019s the shit\n\nWhen you\u2019re small, it\u2019s all g.\n\nFlat rate, no monthly, quick sign-up.\n\nThat \u201cflat rate\u201d ain\u2019t a deal, bud it\u2019s a gerbert tax fam\n\nAnd here\u2019s the kicker, croski\u2026\n\nWith their PayFac setup, your money don\u2019t even hit your account", "tweet_url": "https://x.com/JerichoPayments/status/1961630349315973355", "media": [], "topic": "ads"}, {"id": "1961579742768853252", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-08-30T00:00:29Z", "screen_name": "Artzchillect", "name": "Artzchillect", "avatar": "https://pbs.twimg.com/profile_images/19796436704511 , "topic": "ads"}, {"id": "1961259264510496832", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-08-29T02:47:01Z", "screen_name": "cr8tornick", "name": "Nick Meily", "avatar": "https://pbs.twimg.com/profile_images/1773460758153826304/oc1pdifE_normal.jpg", "text": "unspoken truth:\n\nthe moment you realize you're good at something\u00a0\n\nit\u2019s terrifying\n\nbecause now you have something to lose\n\nwhen you suck, every view is a gift.\u00a0\n\nwhen you're good, every video that underperforms feels like proof you've LOST IT\n\nthe pressure of maintaining quality", "tweet_url": "https://x.com/cr8tornick/status/1961259264510496832", "media": [], "topic": "mindset"}, {"id": "1961186675373334697", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-08-28T21:58:35Z", "screen_name": "Reecebrah", "name": "Reece", "avatar": "https://pbs.twimg.com/profile_images/1734779205164908544/1O7LQPvS_normal.jpg", "text": "\u201cThis is REAL wealth\u201d\n\n*picture of a family*\n\nNo it\u2019s f*cking not\n\nHaving a family isn\u2019t hard\n\nLiterally almost everybody does it\n\nWealth is having a lot of f*cking money\n\nYeah family isn\u2019t good\n\nBut it\u2019s not exceptional\n\nIt\u2019s a basic standard\n\nStop coping.", "tweet_url": "https://x.com/Reecebrah/status/1961186675373334697", "media": [], "topic": "mindset"}, {"id": "1961141623888515185", "bookmark_date": "2026-03-01T16:53:24.811Z", "tweeted_at": "2025-08-28T18:59:34Z", "screen_name": "stronger_ads", "name": "Eugene Schwartzenegger", "avatar": "https://pbs.twimg.com/profile_images/1934408530746122240/cB4HmtQK_normal.jpg", "text": "If you\u2019re a new copywriter and you want to get good fast\u2026\n\nBecome excellent at writing \u201csecondary\u201d.\n\nThese are all the lifts (emails), advertorials and space ads that push to a promotion/video sales letter.\n\nIn fact, other than coming up with big ideas, I can\u2019t think of anything", "tweet_url": "https://x.com/stronger_ads/status/1961141623888515185", "media": [], "topic": "ads"}, {"id": "1961100330118349052", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-08-28T16:15:28Z", "screen_name": "MEvsIRS", "name": "neverpaytax", "avatar": "https://pbs.twimg.com/profile_images/1950590657363423233/Sj0X4icF_normal.jpg", "text": "You have more information and tech IN YOUR HAND AT THIS MOMENT \n\nThan all of mankind combined up until 100 years ago \n\nAnd ur still poor \n\nGrow up nigga", "tweet_url": "https://x.com/MEvsIRS/status/1961100330118349052", "media": [], "topic": "mindset"}, {"id": "1961082728482320426", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-08-28T15:05:32Z", "screen_name": "paolo_scales", "name": "paolo trivellato", "avatar": "https://pbs.twimg.com/profile_images/2023416400904388609/5QW6dalH_normal.jpg", "text": "DON'T use a dark background on your landing pages\n\nit decreases readibility and increases the prospect's cortisol\n\nthis makes them more likely to leave the site and not interact\n\na SaaS company I know changed from dark to light background and increased conversion by 27%", "tweet_url": "https://x.com/paolo_scales/status/1961082728482320426", "media": [], "topic": "ads"}, {"id": "1960749556418928784", "bookmark_date": "2026-03-01T16:53:24.811Z", "tweeted_at": "2025-08-27T17:01:37Z", "screen_name": "demeteralexx", "name": "Alex", "avatar": "https://pbs.twimg.com/profile_images/1740528133516734464/zp0T3AZZ_normal.jpg", "text": "Not all leads are the same\n\nSome make you BANK\n\nOthers drain your sanity\n\nSteal this FRAMEWORK and implement on your LP NOW if you want to start printing: https://t.co/7xJFmLUA39", "tweet_url": "https://x.com/demeteralexx/status/1960749556418928784", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/GzX7N7QWQAAJEIE.png"}], "topic": "ads"}, {"id": "1960732533169041574", "bookmark_date": "2026-03-01T16:53:47.767Z", "tweeted_at": "2025-08-27T15:53:59Z", "screen_name": "im_c0m", "name": "Cam Allen", "avatar": "https://pbs.twimg.com/profile_images/1970781866757128192/kax3o85__normal.jpg", "text": "B2B VSLs are lucky to get 30% engagement\n\nThat's 3 mins for a 10 min vid\n\nSo why wait to pitch?\n\nTell them exactly what you do, the outcome, and then drop the \"early CTA\"\n\nAll in less than 3 mins\n\nThe rest?\n\nExpand on what you said\n\nDon't waste the attention you're given", "tweet_url": "https://x.com/im_c0m/status/1960732533169041574", "media": [], "topic": "ads"}, {"id": "1960663358614421571", "bookmark_date": "2026-03-01T16:53:47.767Z", "tweeted_at": "2025-08-27T11:19:06Z", "screen_name": "RyanClogg", "name": "Ryan Clogg", "avatar": "https://pbs.twimg.com/profile_images/1896353952645419008/oxbjeK8s_normal.jpg", "text": "Mornings with Mark hacking your brain. https://t.co/MxGYrfHh2B", "tweet_url": "https://x.com/RyanClogg/status/1960663358614421571", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/GzWs7H1XkAANfdH.jpg"}], "topic": "ads"}, {"id": "1960576798598607077", "bookmark_date": "2026-03-01T16:53:47.767Z", "tweeted_at": "2025-08-27T05:35:09Z", "screen_name": "nickrgrs", "name": "NICK", "avatar": "https://pbs.twimg.com/profile_images/1806636273555103744/OyQ4fSKc_normal.jpg", "text": "internet biz is super fucking cool\n\nbecause u can just start putting your ideas and energy out there thru content\n\nand before u know it ur voice notes back and forth with dude who built 9fig operation\n\nor another who wants to invest in your thing\n\neverything at ur fingertips now", "tweet_url": "https://x.com/nickrgrs/status/1960576798598607077", "media": [], "topic": "ads"}, {"id": "1960495212653838810", "bookmark_date": "2026-03-01T16:53:47.767Z", "tweeted_at": "2025-08-27T00:10:57Z", "screen_name": "SMB_Attorney", "name": "SMB Attorney", "avatar": "https://pbs.twimg.com/profile_images/2014774463871467520/9N1wQa_Z_normal.jpg", "text": "ChatGPT has been legitimately unusable for me since watching this \n https://t.co/9NcAHoZdJ6", "tweet_ur ly costs MORE than hard drugs\n\njust slow death at a desk...\n\nwhich honestly is worse", "tweet_url": "https://x.com/theaymanarab/status/1960032028604223932", "media": [], "topic": "mindset"}, {"id": "1959601797489992155", "bookmark_date": "2026-03-01T16:53:47.767Z", "tweeted_at": "2025-08-24T13:00:50Z", "screen_name": "MEvsIRS", "name": "neverpaytax", "avatar": "https://pbs.twimg.com/profile_images/1950590657363423233/Sj0X4icF_normal.jpg", "text": "First ever real nigga talk https://t.co/d7oua8THGS", "tweet_url": "https://x.com/MEvsIRS/status/1959601797489992155", "media": [], "topic": "vibes"}, {"id": "1959586214442590531", "bookmark_date": "2026-03-01T16:53:47.767Z", "tweeted_at": "2025-08-24T11:58:55Z", "screen_name": "imsehej", "name": "Singh", "avatar": "https://pbs.twimg.com/profile_images/1998173430403969024/OsYJyBzn_normal.jpg", "text": "In the next 48 hours, I'm going to:\n\n- Create 3 different ad campaigns\n- Create 3 different landing pages\n- Create 3 different funnels\n- Read Principle of Economics (shoutout to @MEvsIRS for rec)\n- Plan the rest of my week\n- Write a few pieces of copy by hand (must try, it makes https://t.co/hsVoGCztU7", "tweet_url": "https://x.com/imsehej/status/1959586214442590531", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/GzHZQJ0bgAA-7gj.jpg"}], "topic": "mindset"}, {"id": "1959520046562095420", "bookmark_date": "2026-03-01T16:53:47.767Z", "tweeted_at": "2025-08-24T07:35:59Z", "screen_name": "argon_delta", "name": "\u0410\u0440\u0433\u043e\u043d", "avatar": "https://pbs.twimg.com/profile_images/1939362442275901440/75uuwj1-_normal.jpg", "text": "the lesson we can all extract from the recent course launch we all know about is even kids our age making millions a month are delusional, wrong and made of sand. deffo not some mythological figure that spent 20 years perfecting their craft in a cave. \n\nThe difference between you", "tweet_url": "https://x.com/argon_delta/status/1959520046562095420", "media": [], "
