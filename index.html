//pbs.twimg.com/profile_images/1791376736611184640/7opxd9HM_normal.jpg", "text": "Why is everyone in online biz obsessed with one-upping with age?\n\n\u201cI\u2019m only 16 making $100k/mo,\" .. \"retired at 21,\" u know the type\n\nAt 19 I was a snot-nosed intern (unpaid) for a couple of ecom YouTuber bros. Videographer, editor, food runner, booking flights, the whole deal.", "tweet_url": "https://x.com/PhantomStays/status/1959272441508774073", "media": [], "topic": "ads"}, {"id": "1959238298305548754", "bookmark_date": "2026-03-01T16:53:59.804Z", "tweeted_at": "2025-08-23T12:56:25Z", "screen_name": "itsmarcosruiz", "name": "Marcos", "avatar": "https://pbs.twimg.com/profile_images/1841954156711391232/nxHYsTVR_normal.jpg", "text": "Every master had a master\nEvery mentor had a mentor\nEvery teacher had a teacher\n\nStop trying to figure everything out on your own.\n\nKnowledge is neither created nor destroyed", "tweet_url": "https://x.com/itsmarcosruiz/status/1959238298305548754", "media": [], "topic": "ads"}, {"id": "1959015495568363940", "bookmark_date": "2026-03-01T16:53:59.804Z", "tweeted_at": "2025-08-22T22:11:05Z", "screen_name": "iamsebetancur", "name": "Sebastian Betancur", "avatar": "https://pbs.twimg.com/profile_images/1842260004071497728/2HordXsP_normal.jpg", "text": "That\u2019s why we get such good client results \ud83d\udc85\ud83c\udffc https://t.co/C5oZ3CWw3Z", "tweet_url": "https://x.com/iamsebetancur/status/1959015495568363940", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/Gy_SNc8WMAEsbbj.jpg"}], "topic": "ads"}, {"id": "1958955298993119460", "bookmark_date": "2026-03-01T16:53:59.804Z", "tweeted_at": "2025-08-22T18:11:53Z", "screen_name": "quinnslcm", "name": "quinn", "avatar": "https://pbs.twimg.com/profile_images/1910123667545280512/pYSG2jOR_normal.jpg", "text": "how to get 100,000 followers on instagram (thread)", "tweet_url": "https://x.com/quinnslcm/status/1958955298993119460", "media": [], "topic": "ads"}, {"id": "1958940302716338427", "bookmark_date": "2026-03-01T16:53:36.487Z", "tweeted_at": "2025-08-22T17:12:18Z", "screen_name": "evanseech", "name": "Evan Seech | Ads & Funnels", "avatar": "https://pbs.twimg.com/profile_images/1911577438217244672/CB0Ogshn_normal.jpg", "text": "\u2019Book a call\u2019 funnels are NOT dead. \n\nIn 2025: we\u2019ve used them to generate 7-figures in revenue for dozens of businesses. \n\nHere\u2019s my 5-step playbook on how you should run them:\n\n1/\nDitch the \u201c2018 VSL\u201d funnel.\n\nNobody is going to book in and show up without being nurtured.", "tweet_url": "https://x.com/evanseech/status/1958940302716338427", "media": [], "topic": "ads"}, {"id": "1958935335603175626", "bookmark_date": "2026-03-01T16:53:59.804Z", "tweeted_at": "2025-08-22T16:52:33Z", "screen_name": "thebrettway", "name": "Brett Malinowski", "avatar": "https://pbs.twimg.com/profile_images/1752889861735088128/pqsi8cpf_normal.jpg", "text": "My last course launch had 3,640 people try to buy but only 3,081 succeeded\n\n557 people wanted to buy my product but couldn't \n\nThis cost me over $75,000 in sales from customers who just weren\u2019t allowed to buy\n\nAnd I bet if you look at your payments dashboard you would see https://t.co/KtALpjNSgG", "tweet_url": "https://x.com/thebrettway/status/1958935335603175626", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/Gy-Itf9WUAE91AL.jpg"}], "topic": "ads"}, {"id": "1958665981028340202", "bookmark_date": "2026-03-01T16:53:59.804Z", "tweeted_at": "2025-08-21T23:02:14Z", "screen_name": "Reecebrah", "name": "Reece", "avatar": "https://pbs.twimg.com/profile_images/1734779205164908544/1O7LQPvS_normal.jpg", "text": "Caring too much about politics comes from a place of scarcity\n\nThe belief that you can\u2019t be ok unless a certain place is a certain way\n\nBut objective reality tells a different story\n\nPeople win in times of collapse as much as in times of prosperity\n\nYou don\u2019t have to stay", "tweet_url": "https://x.com/Reecebrah/status/1958665981028340202", "media": [], "topic": "mindset"}, {"id": "1958040588181467510", "bookmark_date": "2026-03-01T16:53:59.804Z", "tweeted_at": "2025-08-20T05:37:09Z", "screen_name": "qfulm", "name": "quinn fulmer", "avatar": "https://pbs.twimg.com/profile_images/1925843302349185024/qq9iL5cH_normal.jpg", "text": "if u r trying to spin up a yt channel for yourself/biz, watch out for these things:\n\n- if you immediately change face after camera stops recording, you're doing it wrong\n\n- don't compete on money/lifestyle as ur differentiator unless you're actually super breaded &amp; spend like", "tweet_url": "https://x.com/qfulm/status/1958040588181467510", "media": [], "topic": "mindset"}, {"id": "1957817757216424089", "bookmark_date": "2026-03-01T16:53:59.804Z", "tweeted_at": "2025-08-19T14:51:42Z", "screen_name": "copywriter_adam", "name": "Adam Papp", "avatar": "https://pbs.twimg.com/profile_images/1969392792217530368/nfETYI3s_normal.jpg", "text": "How you gonna run a business when you can\u2019t even run your life?", "tweet_url": "https://x.com/copywriter_adam/status/1957817757216424089", "media": [], "topic": "mindset"}, {"id": "1957775522773233984", "bookmark_date": "2026-03-01T16:53:59.804Z", "tweeted_at": "2025-08-19T12:03:52Z", "screen_name": "lamxnt", "name": "riley.", "avatar": "https://pbs.twimg.com/profile_images/1846639343248531456/ZvakmOW9_normal.jpg", "text": "Reminder that saturation is a non-existant problem if you focus on product.\n\n\"If you build it they will come\" is not real, if it were people like me wouldn't exist. You need to market.\n\nBut as far as saturation specifically goes, you're not \"competing\" with anyone if your product", "tweet_url": "https://x.com/lamxnt/status/1957775522773233984", "media": [], "topic": "mindset"}, {"id": "1957700695819186325", "bookmark_date": "2026-03-01T16:53:59.804Z", "tweeted_at": "2025-08-19T07:06:32Z", "screen_name": "copywriter_adam", "name": "Adam Papp", "avatar": "https://pb function esc(s){ return String(s).replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'"); }
function ea(s){ return String(s).replace(/"/g,'&quot;'); }
function linkify(raw){
  let s=esc(raw);
  s=s.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener" onclick="event.stopPropagation()">$1</a>');
  s=s.replace(/@(\w+)/g,'<a href="https://x.com/$1" target="_blank" rel="noopener" onclick="event.stopPropagation()">@$1</a>');
  return s;
}
function fmtDate(iso){
  const d=new Date(iso),now=new Date(),diff=(now-d)/1000;
  if(diff<3600) return Math.floor(diff/60)+'m';
  if(diff<86400) return Math.floor(diff/3600)+'h';
  if(diff<86400*30) return Math.floor(diff/86400)+'d';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtSec(s){ s=Math.floor(s||0); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

const TC={ai:'#7dd3fc',design:'#c4b5fd',music:'#f9a8d4',ads:'#86efac',mindset:'#fdba74',vibes:'#f0c040',cars:'#fb7185','rabbit hole':'#a78bfa'};

let _vi=0;
function mkVideo(m){
  const id='vp'+(_vi++), src=ea(m.url), thumb=ea(m.thumb);
  return `<div class="vp-wrap" id="${id}_w">
    <div class="vp-thumb-state" id="${id}_t" onclick="vpPlay('${id}')">
      <img src="${thumb}" loading="lazy" alt="">
      <div class="vp-play-btn"><div class="vp-play-circle"><svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg></div></div>
    </div>
    <div class="vp-video-state" id="${id}_v">
      <video id="${id}_vid" src="${src}" preload="none" playsinline
        ontimeupdate="vpTU('${id}')" onended="vpEnd('${id}')" onpause="vpIP('${id}')" onplay="vpIPl('${id}')"></video>
      <div class="vp-controls">
        <button class="vp-btn" onclick="vpToggle('${id}')"><svg width="14" height="14" fill="white" viewBox="0 0 24 24"><path id="${id}_ic" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
        <div class="vp-progress" onclick="vpSeek('${id}',event)"><div class="vp-progress-fill" id="${id}_f"></div></div>
        <span class="vp-time" id="${id}_tm">0:00</span>
        <button class="vp-btn" onclick="vpMute('${id}')"><svg width="14" height="14" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path id="${id}_vl" d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
        <input class="vp-vol" type="range" min="0" max="1" step="0.05" value="1" oninput="vpVol('${id}',this.value)" onclick="event.stopPropagation()">
      </div>
    </div>
  </div>`;
}

function vpPlay(id){ document.getElementById(id+'_t').style.display='none'; document.getElementById(id+'_v').style.display='block'; document.getElementById(id+'_vid').play().catch(()=>{}); }
function vpToggle(id){ const v=document.getElementById(id+'_vid'); if(v) v.paused?v.play():v.pause(); }
function vpIPl(id){ const e=document.getElementById(id+'_ic'); if(e) e.setAttribute('d','M6 19h4V5H6v14zm8-14v14h4V5h-4z'); }
function vpIP(id){ const e=document.getElementById(id+'_ic'); if(e) e.setAttribute('d','M5 3l14 9-14 9V3z'); }
function vpEnd(id){ document.getElementById(id+'_v').style.display='none'; document.getElementById(id+'_t').style.display='block'; const f=document.getElementById(id+'_f'); if(f) f.style.width='0%'; }
function vpTU(id){ const v=document.getElementById(id+'_vid'); if(!v||!v.duration) return; const f=document.getElementById(id+'_f'); if(f) f.style.width=(v.currentTime/v.duration*100).toFixed(1)+'%'; const t=document.getElementById(id+'_tm'); if(t) t.textContent=fmtSec(v.currentTime)+' / '+fmtSec(v.duration); }
function vpSeek(id,e){ const v=document.getElementById(id+'_vid'); if(!v||!v.duration) return; const r=e.currentTarget.getBoundingClientRect(); v.currentTime=((e.clientX-r.left)/r.width)*v.duration; }
function vpMute(id){ const v=document.getElementById(id+'_vid'); if(!v) return; v.muted=!v.muted; const e=document.getElementById(id+'_vl'); if(e) e.setAttribute('d',v.muted?'M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6':'M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14'); }
function vpVol(id,val){ const v=document.getElementById(id+'_vid'); if(v){v.volume=val;v.muted=(val==0);} }

function mkVideoThumb(m){
  return `<a href="${ea(m.tweet_url)}" target="_blank" rel="noopener" class="vt-wrap" onclick="event.stopPropagation()">
    <img src="${ea(m.url)}" loading="lazy" alt="">
    <div class="vt-overlay"><div class="vt-play-circle"><svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg></div></div>
    <span class="vt-label">Watch on X</span>
  </a>`;
}

function mkGif(m){ return `<div class="gif-wrap"><video src="${ea(m.url)}" autoplay loop muted playsinline></video><span class="gif-badge">GIF</span></div>`; }

function mkPhotos(photos){
  const n=Math.min(photos.length,4);
  const cells=photos.slice(0,4).map(p=>`<div class="photo-cell" onclick="event.stopPropagation();openLb('${ea(p.url)}')"><img src="${ea(p.url)}" loading="lazy" alt=""></div>`).join('');
  return `<div class="photo-grid n${n}">${cells}</div>`;
}

function renderMedia(media){
  if(!media||!media.length) return '';
  let h='';
  media.filter(m=>m.type==='video').forEach(m=>h+=mkVideo(m));
  media.filter(m=>m.type==='gif').forEach(m=>h+=mkGif(m));
  media.filter(m=>m.type==='video_thumb').forEach(m=>h+=mkVideoThumb(m));
  const photos=media.filter(m=>m.type==='photo');
  if(photos.length) h+=mkPhotos(photos);
  return h;
}

function renderTweet(t,delay){
  const isLong=t.text.length>400;
  const color=TC[t.topic]||'#555';
  return `<div class="tweet" style="animation-delay:${delay}ms">
    <img class="avatar" src="${ea(t.avatar)}" loading="lazy" alt=""
      onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\'><rect width=\\'40\\' height=\\'40\\' fill=\\'%23222\\'/></svg>'">
    <div>
      <div class="tweet-meta">
        <span class="topic-dot" style="background:${color}" title="${esc(t.topic||'')}"></span>
        <span class="tweet-name">${esc(t.name)}</span>
        <span class="tweet-handle">@${t.screen_name}</span>
        <span class="tweet-date">${fmtDate(t.tweeted_at)}</span>
      </div>
      <div class="tweet-text${isLong?' collapsed':''}" id="tx${t.id}">${linkify(t.text)}</div>
      ${isLong?`<button class="show-more-btn" onclick="expand('tx${t.id}',this)">Show more ↓</button>`:''}
      ${renderMedia(t.media)}
      <a href="${ea(t.tweet_url)}" target="_blank" rel="noopener" class="open-x-link" onclick="event.stopPropagation()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.718l7.726-8.84L1.254 2.25h6.232l4.29 5.671 5.468-5.671zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
        Open on X
      </a>
    </div>
  </div>`;
}

function expand(id,btn){ const el=document.getElementById(id); if(el){el.classList.remove('collapsed');btn.style.display='none';} }
function openLb(url){ document.getElementById('lb-content').innerHTML=`<img src="${url}" alt="">`; document.getElementById('lightbox').classList.add('open'); }
function closeLb(){ document.getElementById('lightbox').classList.remove('open'); document.getElementById('lb-content').innerHTML=''; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeLb(); });

let mf='all', tf='all', sq='';

function getFiltered(){
  return TWEETS.filter(t=>{
    if(mf==='photo' && !t.media.some(m=>m.type==='photo')) return false;
    if(mf==='video' && !t.media.some(m=>['video','gif','video_thumb'].includes(m.type))) return false;
    if(mf==='text' && t.media.length>0) return false;
    if(tf!=='all' && t.topic!==tf) return false;
    if(sq){ const q=sq.toLowerCase(); if(!t.text.toLowerCase().includes(q)&&!t.name.toLowerCase().includes(q)&&!t.screen_name.toLowerCase().includes(q)) return false; }
    return true;
  });
}

function render(){
  _vi=0;
  const list=getFiltered();
  document.getElementById('count-badge').textContent=list.length+' saved';
  const feed=document.getElementById('feed');
  if(!list.length){ feed.innerHTML='<div class="empty"><p>No bookmarks found</p></div>'; return; }
  // Render in chunks to avoid blocking
  const CHUNK=50;
  feed.innerHTML='';
  let i=0;
  function renderChunk(){
    const frag=document.createDocumentFragment();
    const end=Math.min(i+CHUNK,list.length);
    const tmp=document.createElement('div');
    for(;i<end;i++){
      tmp.innerHTML=renderTweet(list[i], Math.min(i,20)*8);
      frag.appendChild(tmp.firstChild);
    }
    feed.appendChild(frag);
    if(i<list.length) requestAnimationFrame(renderChunk);
  }
  renderChunk();
}

function updateStats(){
  document.getElementById('s-total').textContent=TWEETS.length;
  document.getElementById('s-photos').textContent=TWEETS.filter(t=>t.media.some(m=>m.type==='photo')).length;
  document.getElementById('s-videos').textContent=TWEETS.filter(t=>t.media.some(m=>['video','gif','video_thumb'].includes(m.type))).length;
  document.getElementById('s-authors').textContent=new Set(TWEETS.map(t=>t.screen_name)).size;
}

document.getElementById('media-bar').addEventListener('click',e=>{ const b=e.target.closest('[data-media]'); if(!b) return; document.querySelectorAll('[data-media]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); mf=b.dataset.media; render(); });
document.getElementById('topic-bar').addEventListener('click',e=>{ const b=e.target.closest('[data-topic]'); if(!b) return; document.querySelectorAll('[data-topic]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); tf=b.dataset.topic; render(); });
let _st;
document.getElementById('search').addEventListener('input',e=>{ clearTimeout(_st); _st=setTimeout(()=>{sq=e.target.value.trim();render();},200); });

updateStats();
render();
</script>
