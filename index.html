<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookmarks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --border: rgba(255,255,255,0.06);
    --text: #e8e8e8;
    --muted: #666;
    --accent: #f0c040;
    --hover: rgba(255,255,255,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 72px;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 0; gap: 8px; z-index: 100;
  }
  .logo {
    width: 40px; height: 40px; background: var(--accent); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: #000; margin-bottom: 16px;
  }
  .nav-btn {
    width: 44px; height: 44px; border-radius: 12px; border: none;
    background: transparent; color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .nav-btn:hover, .nav-btn.active { background: var(--hover); color: var(--accent); }

  .main { margin-left: 72px; max-width: 680px; padding: 0 0 80px; }

  .header {
    position: sticky; top: 0;
    background: rgba(10,10,11,0.92); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border); padding: 20px 24px 16px; z-index: 50;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .header h1 { font-family: 'Instrument Serif', serif; font-size: 26px; font-weight: 400; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); font-style: italic; }
  .count-badge { font-size: 11px; font-weight: 600; color: var(--muted); font-family: 'DM Mono', monospace; }

  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #search {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px;
    padding: 10px 12px 10px 38px; outline: none; transition: border-color 0.2s;
  }
  #search:focus { border-color: rgba(240,192,64,0.3); }
  #search::placeholder { color: var(--muted); }

  /* Filter rows */
  .filter-section { border-bottom: 1px solid var(--border); }
  .filter-label {
    padding: 8px 24px 4px;
    font-size: 9px; font-weight: 700; color: var(--muted);
    letter-spacing: 1.5px; text-transform: uppercase; font-family: 'DM Mono', monospace;
  }
  .filter-bar {
    display: flex; gap: 6px; padding: 6px 24px 12px;
    overflow-x: auto; scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 11px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .filter-chip:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  /* Topic chip colors when active */
  .filter-chip[data-topic="ai"].active      { background: #7dd3fc; border-color: #7dd3fc; color: #000; }
  .filter-chip[data-topic="design"].active  { background: #c4b5fd; border-color: #c4b5fd; color: #000; }
  .filter-chip[data-topic="music"].active   { background: #f9a8d4; border-color: #f9a8d4; color: #000; }
  .filter-chip[data-topic="ads"].active     { background: #86efac; border-color: #86efac; color: #000; }
  .filter-chip[data-topic="mindset"].active { background: #fdba74; border-color: #fdba74; color: #000; }
  .filter-chip[data-topic="vibes"].active   { background: #f0c040; border-color: #f0c040; color: #000; }
  .filter-chip[data-topic="cars"].active    { background: #fb7185; border-color: #fb7185; color: #000; }
  .filter-chip[data-topic="rabbit hole"].active { background: #a78bfa; border-color: #a78bfa; color: #000; }

  /* Topic dot on tweet */
  .topic-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    margin-right: 5px; flex-shrink: 0; vertical-align: middle;
  }
  .topic-ai        { background: #7dd3fc; }
  .topic-design    { background: #c4b5fd; }
  .topic-music     { background: #f9a8d4; }
  .topic-ads       { background: #86efac; }
  .topic-mindset   { background: #fdba74; }
  .topic-vibes     { background: #f0c040; }
  .topic-cars      { background: #fb7185; }
  .topic-rabbit-hole { background: #a78bfa; }

  /* Tweet */
  .tweet {
    padding: 18px 24px 16px; border-bottom: 1px solid var(--border);
    display: grid; grid-template-columns: 40px 1fr; gap: 12px;
    animation: fadeIn 0.3s ease both;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

  .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
  .tweet-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .tweet-name { font-size: 14px; font-weight: 700; }
  .tweet-handle { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .tweet-date { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-left: auto; }

  .tweet-text {
    font-size: 14px; line-height: 1.6; color: #d0d0d0;
    white-space: pre-wrap; word-break: break-word; margin-bottom: 2px;
  }
  .tweet-text a { color: #5ba3d9; text-decoration: none; }
  .tweet-text a:hover { text-decoration: underline; }
  .tweet-text.collapsed { max-height: 280px; overflow: hidden; position: relative; }
  .tweet-text.collapsed::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
    background: linear-gradient(transparent, var(--bg));
  }
  .show-more-btn {
    background: none; border: none; color: var(--accent); font-size: 13px;
    font-family: 'Syne', sans-serif; cursor: pointer; padding: 4px 0;
    margin-top: 4px; display: block; font-weight: 600;
  }
  .show-more-btn:hover { text-decoration: underline; }

  .open-x-link {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace;
    text-decoration: none; margin-top: 10px; padding: 5px 10px;
    border: 1px solid var(--border); border-radius: 8px; transition: all 0.2s;
  }
  .open-x-link:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

  /* Photos */
  .media-wrap { margin-top: 12px; }
  .media-grid { border-radius: 12px; overflow: hidden; display: grid; gap: 2px; }
  .media-grid.count-1 { grid-template-columns: 1fr; }
  .media-grid.count-2 { grid-template-columns: 1fr 1fr; }
  .media-grid.count-3 { grid-template-columns: 1fr 1fr; }
  .media-grid.count-3 .media-item:first-child { grid-row: 1/3; }
  .media-grid.count-4 { grid-template-columns: 1fr 1fr; }
  .media-item {
    position: relative; overflow: hidden; background: #1a1a1a;
    cursor: pointer; aspect-ratio: 1/1;
  }
  .media-grid.count-1 .media-item { aspect-ratio: unset; max-height: 420px; }
  .media-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
  .media-item:hover img { transform: scale(1.03); }

  /* ── Inline video player ── */
  .video-player {
    margin-top: 12px;
    border-radius: 14px;
    overflow: hidden;
    background: #000;
    position: relative;
    /* aspect ratio will be set inline */
  }
  /* The actual <video> fills the container completely */
  .video-player video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: absolute;
    inset: 0;
  }
  /* Thumbnail shown before play */
  .video-player .vthumb {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
    transition: opacity 0.25s;
    z-index: 2;
  }
  .video-player.playing .vthumb { opacity: 0; pointer-events: none; }

  /* Big play button overlay (shown before first play) */
  .video-player .play-overlay {
    position: absolute; inset: 0; z-index: 3;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.25);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .video-player.playing .play-overlay { display: none; }
  .play-circle {
    width: 58px; height: 58px; border-radius: 50%;
    background: rgba(0,0,0,0.72); border: 2px solid rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px); transition: transform 0.15s;
  }
  .play-overlay:hover .play-circle { transform: scale(1.08); }

  /* Controls bar */
  .video-controls {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 4;
    padding: 6px 12px 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    display: flex; align-items: center; gap: 8px;
    opacity: 0; transition: opacity 0.2s;
  }
  .video-player:hover .video-controls,
  .video-player.playing .video-controls { opacity: 1; }

  .vc-btn {
    background: none; border: none; color: #fff; cursor: pointer;
    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
    border-radius: 6px; flex-shrink: 0; transition: background 0.15s; padding: 0;
  }
  .vc-btn:hover { background: rgba(255,255,255,0.15); }

  .vc-progress {
    flex: 1; height: 4px; background: rgba(255,255,255,0.25); border-radius: 2px; cursor: pointer; position: relative;
  }
  .vc-progress-fill {
    height: 100%; background: var(--accent); border-radius: 2px; width: 0%;
    pointer-events: none; transition: width 0.08s linear;
  }
  .vc-time {
    font-size: 10px; color: rgba(255,255,255,0.75);
    font-family: 'DM Mono', monospace; white-space: nowrap; flex-shrink: 0;
  }
  .vc-vol {
    width: 56px; height: 3px; -webkit-appearance: none; appearance: none;
    background: rgba(255,255,255,0.25); border-radius: 2px; cursor: pointer; flex-shrink: 0;
  }
  .vc-vol::-webkit-slider-thumb {
    -webkit-appearance: none; width: 10px; height: 10px;
    border-radius: 50%; background: #fff; cursor: pointer;
  }

  /* GIF */
  .gif-container {
    margin-top: 12px; border-radius: 14px; overflow: hidden;
    position: relative; background: #000;
  }
  .gif-container video { display: block; width: 100%; max-height: 480px; object-fit: cover; }
  .gif-badge {
    position: absolute; bottom: 8px; left: 8px;
    background: rgba(0,0,0,0.75); color: #fff;
    font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace;
    padding: 2px 7px; border-radius: 4px; letter-spacing: 1px; z-index: 2;
  }

  /* Lightbox */
  .lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .lightbox.open { display: flex; }
  #lb-content img, #lb-content video {
    max-width: 92vw; max-height: 92vh; border-radius: 8px; object-fit: contain; display: block;
  }
  .lb-close {
    position: absolute; top: 20px; right: 20px;
    background: rgba(255,255,255,0.1); border: none; color: #fff;
    width: 40px; height: 40px; border-radius: 50%; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .lb-close:hover { background: rgba(255,255,255,0.2); }

  /* Stats */
  .stats { padding: 12px 24px; display: flex; gap: 20px; border-bottom: 1px solid var(--border); }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .stat-label { font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; }

  .empty { padding: 80px 24px; text-align: center; color: var(--muted); }
  .empty p { font-size: 14px; margin-top: 8px; }

  @media (max-width: 600px) {
    .sidebar { width: 0; overflow: hidden; }
    .main { margin-left: 0; }
    .tweet { padding: 14px 16px 14px; }
    .header { padding: 14px 16px; }
    .filter-bar { padding: 6px 16px 10px; }
    .filter-label { padding: 8px 16px 4px; }
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">B</div>
  <button class="nav-btn active" title="Bookmarks">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
  </button>
  <button class="nav-btn" title="Search" onclick="document.getElementById('search').focus()">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
</aside>

<div class="main">
  <div class="header">
    <div class="header-top">
      <h1>Book<span>marks</span></h1>
      <span class="count-badge" id="count-badge">100 saved</span>
    </div>
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search bookmarks..." autocomplete="off">
    </div>
  </div>

  <div class="stats">
    <div class="stat"><span class="stat-num" id="stat-total">—</span><span class="stat-label">Saved</span></div>
    <div class="stat"><span class="stat-num" id="stat-photos">—</span><span class="stat-label">Photos</span></div>
    <div class="stat"><span class="stat-num" id="stat-videos">—</span><span class="stat-label">Videos</span></div>
    <div class="stat"><span class="stat-num" id="stat-authors">—</span><span class="stat-label">Authors</span></div>
  </div>

  <div class="filter-section">
    <div class="filter-label">Media</div>
    <div class="filter-bar" id="media-filters">
      <button class="filter-chip active" data-media="all">All</button>
      <button class="filter-chip" data-media="photo">📷 Photos</button>
      <button class="filter-chip" data-media="video">🎬 Videos</button>
      <button class="filter-chip" data-media="text">✏️ Text only</button>
    </div>
    <div class="filter-label">Topic</div>
    <div class="filter-bar" id="topic-filters">
      <button class="filter-chip active" data-topic="all">All</button>
      <button class="filter-chip" data-topic="ai">🤖 AI &amp; Tech</button>
      <button class="filter-chip" data-topic="design">🎨 Design</button>
      <button class="filter-chip" data-topic="music">🎵 Music</button>
      <button class="filter-chip" data-topic="ads">📈 Ads &amp; Marketing</button>
      <button class="filter-chip" data-topic="mindset">💡 Mindset</button>
      <button class="filter-chip" data-topic="cars">🚗 Cars</button>
      <button class="filter-chip" data-topic="rabbit hole">🕳️ Rabbit Hole</button>
      <button class="filter-chip" data-topic="vibes">✨ Vibes</button>
    </div>
  </div>

  <div id="feed"></div>
</div>

<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div id="lb-content"></div>
</div>

<script>
const TWEETS = [{"id": "2028055985332355163", "bookmark_date": "2026-03-01T12:38:20.961Z", "tweeted_at": "2026-03-01T10:33:21.000Z", "screen_name": "thebeautyofsaas", "name": "BOSS", "avatar": "https://pbs.twimg.com/profile_images/2012506138550349824/H7NOzq7E_normal.jpg", "text": "this is a waste of time for 80% of people trying to improve their quality of life\n\nyou need to learn how to use AI and optimize your workflows, which should take you &lt;2 wks. the REAL advantage is learning how to be HUMAN. Sell, market, become aware, reprogram your thoughts...", "tweet_url": "https://x.com/thebeautyofsaas/status/2028055985332355163", "media": [], "is_long": false, "topic": "ai"}, {"id": "2025673371267023122", "bookmark_date": "2026-03-01T12:36:44.724Z", "tweeted_at": "2026-02-22T20:45:41.000Z", "screen_name": "yzycrave", "name": "crave", "avatar": "https://pbs.twimg.com/profile_images/1989359437476151296/-zhCslQW_normal.jpg", "text": "Ye Unreleased Of The Day - Day 1\n\n\ud83d\udcbf Can't Look In My Eyes (Feat. Kid Cudi)\n\ud83c\udfb5 Era: Cruel Winter (2012)", "tweet_url": "https://x.com/yzycrave/status/2025673371267023122", "media": [{"type": "video", "url": "https://video.twimg.com/amplify_video/2025673027569004544/vid/avc1/720x720/if5uX8uZ11tFsuEd.mp4?tag=21", "thumb": "https://pbs.twimg.com/amplify_video_thumb/2025673027569004544/img/GzuJeYZgeVKcUJIl.jpg", "duration": 326147, "aspect": [1, 1]}], "is_long": false, "topic": "music"}, {"id": "2027579258328256574", "bookmark_date": "2026-03-01T06:52:19.221Z", "tweeted_at": "2026-02-28T02:59:00.000Z", "screen_name": "itsandrewgao", "name": "andrew gao", "avatar": "https://pbs.twimg.com/profile_images/1815256830685450240/AXGpkYb0_normal.jpg", "text": "https://t.co/SW5R237ojC", "tweet_url": "https://x.com/itsandrewgao/status/2027579258328256574", "media": [], "is_long": false, "topic": "ai"}, {"id": "2027842412429685170", "bookmark_date": "2026-03-01T06:34:14.616Z", "tweeted_at": "2026-02-28T20:24:41.000Z", "screen_name": "iblamejulius", "name": "Buyer of Media", "avatar": "https://pbs.twimg.com/profile_images/1963029953244479488/aBdx6i8B_normal.jpg", "text": "Shalom nigga, \nHere\u2019s legit 7 figures worth of creative testing principles for you (alligned with the Andromegayjew shit) \n\nFirst things first, account structure isn\u2019t nearly as important as messaging structure. \n\nYou can use CBO, ABO, ASC, flexible, I don\u2019t care and there are much better TECHNICAL media buyers out there than me who have content on this. \n\nWhat I\u2019ll be focused on how I personally \u201cbatch\u201d creatives, ideate on net new creatives and my variable hierarchy in the ad account. \n\nAny account structure shit is just my personal preference. \n\nBack to it: I use creative \u201cconcepts\u201d. \nI\u2019m sure you\u2019ve heard this term thrown around but there isn\u2019t a uniform definition of what a \u201cconcept\u201d is. \n\nMy personal defition is dumby simple: 1. \u201cwho exactly am I talking to\u201d and 2. \u201chow do I approach them\". That's it. As you can imagine, there's plenty of variations for both. \nThat's the job of the individual creative.  \n\nIn the ad account (again, personal preference):\n- Each concept gets an ID, i.e. CID 1.\n- Each concept is its own ad set. \n- Each unique creative is an ad\n- Each ad per concept gets a decimal I.e. CID 1.1, 1.2, etc. \n\nNow I'll go into how I build new concept. For the examples, assume I\u2019m selling beef tallow. \n\nI have 3 core building blocks for each concept (I personally know some people who do more/ less but this is what works best for me)\n\n1. Persona (the single most important building block) :\n- Highly specific demographics & psychographics pulled from my market research Manus skill.\nTheir exact situation, desires (spoken and unspoken), perceived roadblocks, pain points. \nSpecificity is more important than depth here, depth is what we\u2019ll test on the creative/ ad level.\n\nThat being said sometimes I\u2019ll bundle a couple persona subsets in one specific angle if my research points me in that direction.\n\nExample: \u201ccareer-driven man in his mid- 50s who\u2019s noticing that his youth and vitality is slipping away. Even though he\u2019s achieved material and career success, he lays awake at night reminiscing on how \u201calive\u201d he felt when he had \u201cless\u201d. \n\n2. Angle: \n- this is a specific use case/ utility of my product/ service that solves a specific problem my persona is currently experiencing.\n\nExample: \nProblem: vatality/ youth -> looking younger -> getting rid of the signs of aging on the face. \nUtility: Beef tallow has powerful nutrients that reverse the signs of aging. \n\n3. Sophistication level: \nWhat sophistication segment am I trying to speak to? Where exactly are they in their journey of discovering a solution to their pain? Sophistication (and awareness) is a sliding scale in every single market. Lot of people forget this. \n\nExamples: \na. \"Hasn't really tried any skincare products, he's too busy on more 'important' things like work to focus on his skin.\"  \nFor this awarness segment of my persona I simply need to build the belief that better skin = getting his youth/ vitality back -> briefly touch on the mechanism then introduce product. \n\nb. \"Has tried a bunch of serums and creams that promised the world but never yielded any results\" \nFor this sophistication segment of my persona I need to lean heavy into the UPM (unique problem mechanism) that has lead to all of his previous failed attempts then transition into why the core drivers of my mechanism overcome that UPM. \n\nFinal concept example:\nA career-driven man in his mid- 50s who desperately yearns for  youth and vitality. He can use beef tallow to turn back the clock and erase the years that his face is showing. He hasn't tried skin care before as he doesn't yet know that he can reverse the years from showing on his face. \n\nNow we get to the creatives in each concept. \n\nThere\u2019s two primary variables that I test, each has its own weight. \n\nVariable 1: copy (60-70% weight) .\nExamples (not an exhaustive list I\u2019d be here all day):\n\n- specific \u201cdrivers\u201d of the mechanism your product/ service has that logically align with the angle (super fucking important) \n\n- values, attitudes, lifestyle, ideology, I.e. LOHAS, environmentalist, conservative, culturalist, etc. \n\n- buyer type- specific messaging  I.e. auto-convincer, expressive, analytical, heard-follower, etc. \n\n- belief ladder/s based on the awareness/ sophistication level if there are specific biases I want to overcome. \n\n- tone. This is one of my favorite things to test. Ever notice how there can be two people sharing the same exact idea, but you tend to resonate with Person A over Person B simply due to how the idea is conveyed verbally? Some people resonate with humor, some with candor, others with empathy, etc. You can frame a message in a dozen ways to hit deeply with those people (pro tip: you can extract the most common tone patterns your persona is most likely to connect with during your market research process). \n\n- linguistic patterns & terminology used by the target persona. \n\n- specific pains, unfulfilled desires and core motivators. I won\u2019t test each individually if I see a common pattern from the research. \n\nExample: \"what if the face that stares back at you in the mirror every night could tell a different story? A story of a man who's as strong and full of life as he was in his 20s?)\n\nVariable 2: communication medium aka format.\nThis one\u2019s obvious, here are a few examples: \n\n- direct-to-camera video \n- animation \n- UGC selfie vid \n- product/ service demo \n- green screen\n- native b-roll \n- etc etc etc \n\nNote: I tend to lump statics into the same ad set but a few people like @markbuildsbrand advise against it. Mark is the \ud83d\udc10 so I highly advise you test his advice. \n\nAight that\u2019s it nigga", "tweet_url": "https://x.com/iblamejulius/status/2027842412429685170", "media": [], "is_long": true, "topic": "ads"}, {"id": "2027537482422657367", "bookmark_date": "2026-02-28T18:21:11.054Z", "tweeted_at": "2026-02-28T00:13:00.000Z", "screen_name": "neomechanica", "name": "NEOMECHANICA", "avatar": "https://pbs.twimg.com/profile_images/678896623368335360/hvNn0f5I_normal.jpg", "text": "", "tweet_url": "https://x.com/neomechanica/status/2027537482422657367", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/HBtEZkWWsAAWxyA.jpg"}], "is_long": false, "topic": "design"}, {"id": "2027769729448841604", "bookmark_date": "2026-02-28T18:04:17.267Z", "tweeted_at": "2026-02-28T15:35:52.000Z", "screen_name": "theJayAlto", "name": "Jay Alto", "avatar": "https://pbs.twimg.com/profile_images/1663279003245920256/xdq9i4T3_normal.jpg", "text": "steve jobs gave everyone a bicycle for the mind but forgot most people don't have anywhere to go", "tweet_url": "https://x.com/theJayAlto/status/2027769729448841604", "media": [], "is_long": false, "topic": "mindset"}, {"id": "2027640141645246907", "bookmark_date": "2026-02-28T16:52:51.584Z", "tweeted_at": "2026-02-28T07:00:56.000Z", "screen_name": "kuxshl", "name": "kushal", "avatar": "https://pbs.twimg.com/profile_images/2010708989231988736/IO_odUHH_normal.jpg", "text": "moneyyy branding \n\nw/ oakline", "tweet_url": "https://x.com/kuxshl/status/2027640141645246907", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/HCOf8jUWgAInkyV.jpg"}, {"type": "photo", "url": "https://pbs.twimg.com/media/HCOf8jUWMAIukhP.jpg"}, {"type": "photo", "url": "https://pbs.twimg.com/media/HCOf8jUWkAIbtxT.jpg"}, {"type": "photo", "url": "https://pbs.twimg.com/media/HCOf8j6aMAEfmHB.jpg"}], "is_long": false, "topic": "design"}, {"id": "2027018164870304068", "bookmark_date": "2026-02-27T12:13:46.462Z", "tweeted_at": "2026-02-26T13:49:25.000Z", "screen_name": "blacktwiterthrd", "name": "WELCOME TO BLACK TWlTTER \uea00", "ava .twimg.com/media/HCCp4ZQXoAAuubW.jpg"}, {"type": "photo", "url": "https://pbs.twimg.com/media/HCCp4Y5WQAAlV11.jpg"}, {"type": "photo", "url": "https://pbs.twimg.com/media/HCCp4Y4WYAAeT0B.jpg"}], "is_long": false, "topic": "rabbit hole"}, {"id": "2027024771188150564", "bookmark_date": "2026-02-26T15:23:44.380Z", "tweeted_at": "2026-02-26T14:15:40.000Z", "screen_name": "DandiG_", "name": "Dan @ AdRevival.io", "avatar": "https://pbs.twimg.com/profile_images/1780839881956020224/Ds8YpIc7_normal.jpg", "text": "@adv_ceo @sebasons", "tweet_url": "https://x.com/DandiG_/status/2027024771188150564", "media": [], "is_long": false, "topic": "vibes"}, {"id": "2026590527467258065", "bookmark_date": "2026-02-26T05:01:51.308Z", "tweeted_at": "2026-02-25T09:30:08.000Z", "screen_name": "rahulluthra22", "name": "Rahul Luthra", "avatar": "https://pbs.twimg.com/profile_images/1910625930407796738/u6W98KHk_normal.jpg", "text": "Inter is cool, but have you tried these fonts?\n\n(using these in products I'm working on rn)", "tweet_url": "https://x.com/rahulluthra22/status/2026590527467258065", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/HB_lVO4aMAQgRdw.jpg"}, {"type": "photo", "url": "https://pbs.twimg.com/media/HB_lVdMboAAAf4K.jpg"}, {"type": "photo", "url": "https://pbs.twimg.com/media/HB_lVvSaMAIhict.jpg"}, {"type": "photo", "url": "https://pbs.twimg.com/media/HB_lWBHaEAEBRhF.jpg"}], "is_long": false, "topic": "design"}, {"id": "2026769687636217923", "bookmark_date": "2026-02-26T04:52:07.659Z", "tweeted_at": "2026-02-25T21:22:03.000Z", "screen_name": "CEOLandshark", "name": "Pyrate", "avatar": "https://pbs.twimg.com/profile_images/1763200846492270592/9BoVd5cZ_normal.jpg", "text": "@AlchemyAmerican You should look into Gurdjieff. It answers everything you're looking for and more, it just needs digging. Given how popular your show will get over time, it'd also be a service to the world", "tweet_url": "https://x.com/CEOLandshark/status/2026769687636217923", "media": [], "is_long": false, "topic": "mindset"}, {"id": "2026757422358917524", "bookmark_date": "2026-02-25T20:38:02.003Z", "tweeted_at": "2026-02-25T20:33:19.000Z", "screen_name": "Lukealexxander", "name": "Luke Alexander", "avatar": "https://pbs.twimg.com/profile_images/1944419427681738752/u20w9a6A_normal.jpg", "text": "Join the best AI/business mastermind online for those wanting to maximize their AI output: https://t.co/1axs3Hnnbl", "tweet_url": "https://x.com/Lukealexxander/status/2026757422358917524", "media": [], "is_long": false, "topic": "vibes"}, {"id": "2026325419394474466", "bookmark_date": "2026-02-25T13:32:42.431Z", "tweeted_at": "2026-02-24T15:56:41.000Z", "screen_name": "damnidc__", "name": "\ud83e\udda2", "avatar": "https://pbs.twimg.com/profile_images/1996902070004183040/uuVh2Fxm_normal.jpg", "text": "I was offered $95K. I asked for $110K. They came back with $105K.I accepted. The 30 seconds of discomfort asking for more earned me an extra $10K/year. This is where context matters; that's $50K over 5 years. For 30 seconds of awkwardness.\n\nAlways negotiate. Always.", "tweet_url": "https://x.com/damnidc__/status/2026325419394474466", "media": [], "is_long": false, "topic": "mindset"}, {"id": "2026561413167055083", "bookmark_date": "2026-02-25T13:14:20.334Z", "tweeted_at": "2026-02-25T07:34:27.000Z", "screen_name": "beffjezos", "name": "Beff (e/acc)", "avatar": "https://pbs.twimg.com/profile_images/2005482858975023104/s9wmB9qT_normal.jpg", "text": "Fun-maxxing is the path to excellence in 2026", "tweet_url": "https://x.com/beffjezos/status/2026561413167055083", "media": [{"type": "video", "url": "https://video.twimg.com/ext_tw_video/2026561367272996864/pu/vid/avc1/720x1280/dCNsmgj-ceN5HSwO.mp4?tag=19", "thumb": "https://pbs.twimg.com/ext_tw_video_thumb/2026561367272996864/pu/img/YGEv4wN_Ukw1CwLS.jpg", "duration": 56007, "aspect": [9, 16]}], "is_long": false, "topic": "mindset"}, {"id": "2026362526670172335", "bookmark_date": "2026-02-25T13:11:27.993Z", "tweeted_at": "2026-02-24T18:24:09.000Z", "screen_name": "primed25", "name": "primed", "avatar": "https://pbs.twimg.com/profile_images/2026144160814637056/xGx5ItzY_normal.jpg", "text": "how it feels to jestermaxx in a room full of emploids", "tweet_url": "https://x.com/primed25/status/2026362526670172335", "media": [{"type": "video", "url": "https://video.twimg.com/amplify_video/2026362427445526528/vid/avc1/1000x720/_se3-AHb-qjtustl.mp4?tag=21", "thumb": "https://pbs.twimg.com/amplify_video_thumb/2026362427445526528/img/QVqN7DFjCG8qzewY.jpg", "duration": 60534, "aspect": [25, 18]}], "is_long": false, "topic": "mindset"}, {"id": "2026512730098708938", "bookmark_date": "2026-02-25T07:08:29.101Z", "tweeted_at": "2026-02-25T04:21:00.000Z", "screen_name": "Sierra_rak", "name": "Sierra", "avatar": "https://pbs.twimg.com/profile_images/1997684554967216128/CQSAP7cg_normal.jpg", "text": "These were her conditions to return to ice-skating:\n\n-She picks the music \n\n-She has full control over how she looks\n\n-She gets to eat whatever she wants. Her coaches can\u2019t starve her anymore\n\n-The choreo will be a collaborative effort w/ her, she gets to put elements in that she wants to\n\n-She decides when she needs a break from training, never pushing past her limit\n\n-And her father has to keep his controlling ass out of her art. She said \u2018I love you dad, but you\u2019re not allowed back in.\u2019\n\nAlyssa Liu danced for the joy of it, not for a medal, not for prestige, because she just loves her art.\n\nShe retired at 16 - a world champion - because she lost touch with the joy. The men around her were driving her career, starving, shaping and controlling her. She rebelled and cast off the chains to go live her best life as a normal teen girl.\n\nShe returned a young woman unapologetically and uncompromisingly in charge of her own joy and passion, here to do it her way, and only her way.\n\nBecame world champ at 19 in 2025, ans now gold medalist at 20.", "tweet_url": "https://x.com/Sierra_rak/status/2026512730098708938", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/HB-XEAYaYAAETkw.jpg"}, {"type": "photo", "url": "https://pbs.twimg.com/media/HB-XEBbasAAKn62.jpg"}], "is_long": true, "topic": "mindset"}, {"id": "2026220589938315548", "bookmark_date": "2026-02-24T20:24:46.691Z", "tweeted_at": "2026-02-24T09:00:08.000Z", "screen_name": "Dante_damned", "name": "Dante", "avatar": "https://pbs.twimg.com/profile_images/1999746744134041602/dRf0oGzj_normal.jpg", "text": "Brand Exploration on caffeine. \nWeb implementations comes next.\nStay Put!", "tweet_url": "https://x.com/Dante_damned/status/2026220589938315548", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/HB6TFWFasAE9s1F.jpg"}], "is_long": false, "topic": "design"}, {"id": "2025996158196498847", "bookmark_date": "2026-02-24T12:55:25.922Z", "tweeted_at": "2026-02-23T18:08:19.000Z", "screen_name": "MEvsIRS", "name": "neverpaytax", "avatar": "https://pbs.twimg.com/profile_images/1950590657363423233/Sj0X4icF_normal.jpg", "text": "https://t.co/l7pfZFuzB5", "tweet_url": "https://x.com/MEvsIRS/status/2025996158196498847", "media": [], "is_long": false, "topic": "vibes"}, {"id": "2025362800332202290", "bookmark_date": "2026-02-23T12:29:42.990Z", "tweeted_at": "2026-02-22T00:11:35.000Z", "screen_name": "damianplayer", "name": "Damian Player", "avatar": "https://pbs.twimg.com/profile_images/1919117586735742976/llztJcpL_normal.jpg", "text": "got offered $250K/year + equity at a fast-growing startup last week. turned it down.\n\nwhen you\u2019re building something that compounds, a salary is a ceiling.\n\nif you keep getting tempted by \u201csafe\u201d offers, ask yourself:\n\n-are you building something you\u2019d regret walking away from?\n\n-is your upside capped by someone else\u2019s cap table?\n\n-would you take the offer if your business was 6 months further along?\n\nthat last one is the tell. keep going and know that I\u2019m rooting for you..", "tweet_url": "https://x.com/damianplayer/status/2025362800332202290", "media": [], "is_long": true, "topic": "mindset"}, {"id": "2025880747274272940", "bookmark_date": "2026-02-23T12:26:47.242Z", "tweeted_at": "2026-02-23T10:29:43.000Z", "screen_name": "copywriter_adam", "name": "Adam Papp", "avatar": "https://pbs.twimg.com/profile_images/1969392792217530368/nfETYI3s_normal.jpg", "text": "@FinalPSD that's why you need to tell claude this specifically:\n\n\"cut out all the fluff that doesn't add to the sales argument, and cut every sentence that doesn't advance the sale forward\"\n\nsay cut every sentence, because if you say cut words, your copy will be very robotic", "tweet_url": "https://x.com/copywriter_adam/status/2025880747274272940", "media": [], "is_long": false, "topic": "ads"}, {"id": "2024833990507581497", "bookmark_date": "2026-02-22T15:54:23.410Z", "tweeted_at": "2026-02-20T13:10:17.000Z", "screen_name": "firstadopter", "name": "tae kim", "avatar": "https://pbs.twimg.com/profile_images/1920830186120957952/RdP-qw_N_normal.jpg", "text": "\u201cI love struggling, actually. It makes me feel alive\u201d \u2013 Alysa Liu", "tweet_url": "https://x.com/firstadopter/status/2024833990507581497", "media": [{"type": "video", "url": "https://video.twimg.com/amplify_video/2024833906021691392/vid/avc1/1920x1080/DZct1lybW_X6fBFY.mp4?tag=21", "thumb": "https://pbs.twimg.com/amplify_video_thumb/2024833906021691392/img/oowz0UZraTNPW8hd.jpg", "duration": 5237, "aspect": [16, 9]}], "is_long": false, "topic": "mindset"}, {"id": "2025143407853592849", "bookmark_date": "2026-02-22T06:27:45.077Z", "tweeted_at": "2026-02-21T09:39:48.000Z", "screen_name": "thebeautyofsaas", "name": "BOSS", "avatar": "https://pbs.twimg.com/profile_images/2012506138550349824/H7NOzq7E_normal.jpg", "text": "Would highly recommend everyone to pick this one \n\n&gt;fast read (can be done in less than an hour)\n&gt;perfect mix between being provocative, fun and helpful (hard to achieve when it comes to writing)\n&gt;ideas inside can be applied to any industry\n\nNo chance you will regret reading this", "tweet_url": "https://x.com/thebeautyofsaas/status/2025143407853592849", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/HBrAbzWWEAABgDo.jpg"}], "is_long": true, "topic": "vibes"}, {"id": "2025219068341477384", "bookmark_date": "2026-02-21T22:09:28.164Z", "tweeted_at": "2026-02-21T14:40:27.000Z", "screen_name": "amyoder", "name": "Adam Yoder", "avatar": "https://pbs.twimg.com/profile_images/1917748923894022144/PewMm2U9_normal.jpg", "text": "@NickHintonn It\u2019s more the fact that someone who *could* do these drugs are either very rich or very poor, so they have a LOT of time on their hands and starting asking themselves non-survivalist questions and start seeking more creative answers to life", "tweet_url": "https://x.com/amyoder/status/2025219068341477384", "media": [], "is_long": false, "topic": "mindset"}, {"id": "2025305476603515079", "bookmark_date": "2026-02-21T22:01:59.920Z", "tweeted_at": "2026-02-21T20:23:48.000Z", "screen_name": "lamxnt", "name": "riley.", "avatar": "https://pbs.twimg.com/profile_images/1846639343248531456/ZvakmOW9_normal.jpg", "text": "Claude Code (in VS Code) as home base\n\nGHL API v2 - custom MCP\nWhop MCP\nCloudflare MCP\nMeta ads MCP\nGemini + X API (deep research)\nCustom python agent + Nano Banana\n\n+ custom Claude Skills for copywriting, landing page design, etc\n\nI can:\n\n- Have Gemini + X do deep research\n- Claude writes TSL (foundation for offer)\n- Claude builds landing page, integrates GHL HTML form\n- Whop MCP creates product + integrates checkout into funnel (+ fires webhooks to GHL for CRM\n- Installs meta pixel\n- Nano banana generates static ad creatives\n- Claude writes ad copy, uploads to ads manager + ad creatives\n- Syncs up with Whop API to make sure event match score is 8.5+\n- Launches campaign \n\nCan also handle Microsoft clarity and G4A for tracking. I\u2019m sure Hyros would be easy sync here too\n\nS , "avatar": "https://pbs.twimg.com/profile_images/1776497278892810240/KK3en_ny_normal.jpg", "text": "being a nationalist in a poor country is so tormenting. you live a pathetic life and somehow have to feel proud of it.", "tweet_url": "https://x.com/wojakcodes/status/2021916889019220471", "media": [], "is_long": false, "topic": "rabbit hole"}, {"id": "2021833173508952540", "bookmark_date": "2026-02-12T06:59:53.131Z", "tweeted_at": "2026-02-12T06:26:07.000Z", "screen_name": "yourealazyfvck", "name": "David", "avatar": "https://pbs.twimg.com/profile_images/1890296376933621760/9HyVO3LQ_normal.jpg", "text": "This used to be the consensus but this is absolutely wrong when dealing with paid traffic\n\nCold paid traffic you need to throw them in the funnel IMMEDIATELY because you\u2019re trying to get a response. Also known as Direct Response.\n\nYou\u2019re talking to the 5% of the 5% of people who even read past headline or the hook/drop off point on the VSL.\n\nOn organic, you have the luxury of \u201cnurturing\u201d them with content and lead magnets, and all of that shit because you aren\u2019t paying for traffic and you\u2019re selling through evergreen content assets.\n\nThe biggest guys in info run two funnels:\n\n1 - direct to vsl\n2 - webinar optin to webinar for call booking / straight to checkout on a $1-2k course that they break even on or go negative on since the CAC is super high\n\nActually, this works even BETTER on B2B traffic in specific niche markets because they\u2019re not exposed to course sellers and internet marketing tactics outside of your run of the mill agency kid running a \u201cGet you 100 clients in the next 30 minutes or you don\u2019t pay and I\u2019ll suck you off\u201d offer\n\nIf you spend a few grand on B2B using DR principles and speak directly to ICP pain points you\u2019re essentially guaranteed profitability with enough reach and impressions, especially on an Optin -> VSL -> Book a Call funnel.\n\nBoth of these different customer profiles are attacked and marketed to in 2 incredibly different ways on the front end.\n\nThe long form VSL exists as the trust builder. Cold paid engages with your TOF and you immediately retarget them everywhere shoving all of your MOF content down their throat (like they\u2019re a follower of yours on organic).\n\nSince you\u2019re PAYING for traffic, you need them to convert as fast as possible so you do not pull any punches whatsoever in your sales process.\n\nTraffic + Offer = Cash.\n\nHope this helps.", "tweet_url": "https://x.com/yourealazyfvck/status/2021833173508952540", "media": [], "is_long": true, "topic": "ads"}, {"id": "2021614957582745929", "bookmark_date": "2026-02-11T17:31:42.208Z", "tweeted_at": "2026-02-11T15:59:00.000Z", "screen_name": "msnrhu", "name": "Mason Hughes", "avatar": "https://pbs.twimg.com/profile_images/1978424744773865472/nn3NX-En_normal.jpg", "text": "Before Ye got nerfed", "tweet_url": "https://x.com/msnrhu/status/2021614957582745929", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/HAKhvzLXkAAK_fN.png"}], "is_long": false, "topic": "music"}, {"id": "2021435299952562242", "bookmark_date": "2026-02-11T13:45:51.086Z", "tweeted_at": "2026-02-11T04:05:06.000Z", "screen_name": "anothercohen", "name": "Alex Cohen", "avatar": "https://pbs.twimg.com/profile_images/1886413225786232832/CjFMSLAg_normal.jpg", "text": "This is the most autistic thing I've ever vibe coded. \n\nA Mac app that turns your wallpaper into a 3D Earth view with day/night depending on where in the world you are. Can toggle:\n* Weather\n* Live flights\n* Zoomed views\n* Pollen/Air Quality\n* Globe spin\n\nShould I publish it?", "tweet_url": "https://x.com/anothercohen/status/2021435299952562242", "media": [{"type": "video", "url": "https://video.twimg.com/amplify_video/2021434320284512256/vid/avc1/2984x1790/9ZSawd9e_iAO4m7x.mp4?tag=21", "thumb": "https://pbs.twimg.com/amplify_video_thumb/2021434320284512256/img/pD6ffprtFxib8n8x.jpg", "duration": 78475, " ": "https://x.com/thebeautyofsaas/status/2020506087276138749", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/HApFw5FWsAAcw8c.jpg"}], "is_long": true, "topic": "vibes"}, {"id": "2019616841086411084", "bookmark_date": "2026-02-06T22:21:37.381Z", "tweeted_at": "2026-02-06T03:39:12.000Z", "screen_name": "battleangelviv", "name": "Viv \ud83e\udea9", "avatar": "https://pbs.twimg.com/profile_images/2020914234645938177/WusMdBpJ_normal.jpg", "text": "X has the highest concentration of smart people and those who are great at what they do  \n\nyou won\u2019t find this kind of industry knowledge + insights from key decision makers/leadership of the world\u2019s most interesting companies on any other platform", "tweet_url": "https://x.com/battleangelviv/status/2019616841086411084", "media": [], "is_long": false, "topic": "mindset"}, {"id": "2019539271754084789", "bookmark_date": "2026-02-06T22:20:16.042Z", "tweeted_at": "2026-02-05T22:30:58.000Z", "screen_name": "ruqaiyalore", "name": "ru", "avatar": "https://pbs.twimg.com/profile_images/2012307047409127424/5qXALt4-_normal.jpg", "text": "having random conversations with strangers is kinda what life\u2019s all about idk", "tweet_url": "https://x.com/ruqaiyalore/status/2019539271754084789", "media": [], "is_long": false, "topic": "mindset"}, {"id": "2019790492834152612", "bookmark_date": "2026-02-06T22:14:08.115Z", "tweeted_at": "2026-02-06T15:09:14.000Z", "screen_name": "LucaDaCorte", "name": "Luca Da Corte", "avatar": "https://pbs.twimg.com/profile_images/1738618145953218560/dj4q-XR7_normal.jpg", "text": "\u201cFramer is so easy that anybody from the marketing team can build pages with it!\u201d\n\nThat sounds cool in theory until you see what happens on real projects when there\u2019s nobody overseeing the process:\n\n- Pages drifting away from the style\n\n- Mobile view is often overlooked and broken\n\n- Component dependencies being ignored, with changes in one place affecting dozens of other pages\n\nNow, is the solution going back to a slower process where everything goes through one or two people?\n\nNah.\n\nInstead, what I like to do is:\n\n1. Build 20\u201330 on-brand section components that people can use to spin up new pages quickly, while staying consistent and responsive\n\n2. Record short documentation videos for workflows I know will be used all the time (especially CMS-related ones)\n\n3. Leave notes, comments, and descriptions - never assume a skilled dev will always be the one touching the project\n\nIs it more work upfront? Yes.\n\nDo pre-made sections feel a bit restrictive? Sometimes.\n\nBut overall, it\u2019s a net-positive tradeoff - and one that\u2019s worth discussing and implementing, especially if the team plans to scale the site themselves.", "tweet_url": "https://x.com/LucaDaCorte/status/2019790492834152612", "media": [{"type": "photo", "url": "https://pbs.twimg.com/media/HAe8gAbXkAArifR.png"}], "is_long": true, "topic": "design"}, {"id": "2019820382497145100", "bookmark_date": "2026-02-06T22:12:44.431Z", "tweeted_at": "2026-02-06T17:08:00.000Z", "screen_name": "NavalQuotes247", "name": "Naval Quotes", "avatar": "https://pbs.twimg.com/profile_images/1350932012073447432/t-UGBlGF_normal.jpg", "text": "\"Asymmetric opportunities:\n\nInvest in startups\nStart a company\nCreate a book, podcast, video\nCreate a (software) product\nGo on many first dates\nGo to a cocktail party\nRead a Lindy book\nMove to a big city\nBuy Bitcoin\nTweet.\"\n\n@naval", "tweet_url": "https://x.com/NavalQuotes247/status/2019820382497145100", "media": [], "is_long": false, "topic": "ads"}, {"id": "2019110200280744189", "bookmark_date": "2026-02-06T22:11:55.253Z", "tweeted_at": "2026-02-04T18:05:59.000Z", "screen_name": "cigarettesummer", "name": "lem\u00f3n", "avatar": "https://pbs.twimg.com/profile_images/1975989738851958784/8EPYR-x8_normal.jpg", "text": "The future were promised but never got", "tweet_url": "https://x.com/cigarettesummer/status/2019110200280744189", "me // ── helpers ──────────────────────────────────────────────────────────────────
function esc(s){
  return String(s)
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<')
    .replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
}
function escA(s){ return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function linkify(raw){
  let s = esc(raw);
  s = s.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener" onclick="event.stopPropagation()">$1</a>');
  s = s.replace(/@(\w+)/g,'<a href="https://x.com/$1" target="_blank" rel="noopener" onclick="event.stopPropagation()">@$1</a>');
  return s;
}
function fmtDate(iso){
  const d=new Date(iso), now=new Date(), diff=(now-d)/1000;
  if(diff<3600) return Math.floor(diff/60)+'m';
  if(diff<86400) return Math.floor(diff/3600)+'h';
  if(diff<86400*30) return Math.floor(diff/86400)+'d';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fmtSec(s){
  s=Math.floor(s||0);
  return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
}
const TOPIC_COLORS = {
  ai:'#7dd3fc', design:'#c4b5fd', music:'#f9a8d4', ads:'#86efac',
  mindset:'#fdba74', vibes:'#f0c040', cars:'#fb7185', 'rabbit hole':'#a78bfa'
};

// ── video component ───────────────────────────────────────────────────────────
let _vidIdx = 0;
function mkVideo(m){
  const i = _vidIdx++;
  const id = 'v'+i;
  // Compute padding-top for aspect ratio box
  const ar = m.aspect ? m.aspect[1]/m.aspect[0] : 9/16;
  const pt = Math.min(ar * 100, 100); // cap at 100%
  return `
<div class="video-player" id="vp${i}" style="padding-top:${pt.toFixed(2)}%;">
  <video id="${id}" src="${escA(m.url)}" preload="none" playsinline
    ontimeupdate="_vtu('${id}',${i})" onended="_vend(${i})" onpause="_vpause(${i})" onplay="_vplay(${i})">
  </video>
  <img class="vthumb" src="${escA(m.thumb)}" loading="lazy" alt="">
  <div class="play-overlay" onclick="_vstart('${id}',${i})">
    <div class="play-circle">
      <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>
    </div>
  </div>
  <div class="video-controls">
    <button class="vc-btn" id="pb${i}" onclick="_vtoggle('${id}',${i})">
      <svg width="14" height="14" fill="white" viewBox="0 0 24 24"><path id="pp${i}" d="M5 3l14 9-14 9V3z"/></svg>
    </button>
    <div class="vc-progress" onclick="_vseek('${id}',${i},event)">
      <div class="vc-progress-fill" id="pf${i}"></div>
    </div>
    <span class="vc-time" id="vt${i}">0:00</span>
    <button class="vc-btn" onclick="_vmute('${id}',${i})" title="Mute">
      <svg width="14" height="14" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path id="vv${i}" d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
    </button>
    <input type="range" class="vc-vol" min="0" max="1" step="0.05" value="1"
      oninput="_vvol('${id}',this.value)" onclick="event.stopPropagation()">
  </div>
</div>`;
}

function _vstart(id, i){
  const v=document.getElementById(id), p=document.getElementById('vp'+i);
  if(!v) return;
  p.classList.add('playing');
  v.play();
}
function _vplay(i){
  const p=document.getElementById('vp'+i);
  if(p) p.classList.add('playing');
  const pp=document.getElementById('pp'+i);
  if(pp) pp.setAttribute('d','M6 19h4V5H6v14zm8-14v14h4V5h-4z'); // pause icon
}
function _vpause(i){
  const pp=document.getElementById('pp'+i);
  if(pp) pp.setAttribute('d','M5 3l14 9-14 9V3z'); // play icon
}
function _vend(i){
  const p=document.getElementById('vp'+i);
  if(p) p.classList.remove('playing');
  const pf=document.getElementById('pf'+i);
  if(pf) pf.style.width='0%';
  const vt=document.getElementById('vt'+i);
  if(vt) vt.textContent='0:00';
}
function _vtoggle(id,i){
  const v=document.getElementById(id); if(!v) return;
  v.paused ? v.play() : v.pause();
}
function _vtu(id,i){
  const v=document.getElementById(id); if(!v||!v.duration) return;
  const pct=(v.currentTime/v.duration*100).toFixed(1)+'%';
  const pf=document.getElementById('pf'+i); if(pf) pf.style.width=pct;
  const vt=document.getElementById('vt'+i);
  if(vt) vt.textContent=fmtSec(v.currentTime)+' / '+fmtSec(v.duration);
}
function _vseek(id,i,e){
  const v=document.getElementById(id); if(!v||!v.duration) return;
  const r=e.currentTarget.getBoundingClientRect();
  v.currentTime=((e.clientX-r.left)/r.width)*v.duration;
}
function _vmute(id,i){
  const v=document.getElementById(id); if(!v) return;
  v.muted=!v.muted;
  const vv=document.getElementById('vv'+i);
  if(vv) vv.setAttribute('d', v.muted
    ? 'M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6'
    : 'M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14');
}
function _vvol(id,val){
  const v=document.getElementById(id); if(!v) return;
  v.volume=val; v.muted=(val==0);
}

function mkGif(m){
  return `<div class="gif-container">
    <video src="${escA(m.url)}" autoplay loop muted playsinline></video>
    <span class="gif-badge">GIF</span>
  </div>`;
}

function mkPhotos(photos){
  const n=Math.min(photos.length,4);
  const items=photos.slice(0,4).map(p=>
    `<div class="media-item" onclick="event.stopPropagation();openLb('${escA(p.url)}')">
      <img src="${escA(p.url)}" loading="lazy" alt="">
    </div>`).join('');
  return `<div class="media-wrap"><div class="media-grid count-${n}">${items}</div></div>`;
}

function renderMedia(media){
  if(!media||!media.length) return '';
  let h='';
  media.filter(m=>m.type==='video').forEach(m=>{ h+=mkVideo(m); });
  media.filter(m=>m.type==='gif').forEach(m=>{ h+=mkGif(m); });
  const photos=media.filter(m=>m.type==='photo');
  if(photos.length) h+=mkPhotos(photos);
  return h;
}

// ── tweet card ────────────────────────────────────────────────────────────────
function renderTweet(t, delay){
  const isLong = t.text.length > 400;
  const color = TOPIC_COLORS[t.topic] || '#666';
  const topicSlug = (t.topic||'vibes').replace(/\s+/g,'-');
  return `<div class="tweet" style="animation-delay:${delay}ms">
    <img class="avatar" src="${escA(t.avatar)}" loading="lazy" alt=""
      onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\'><rect width=\\'40\\' height=\\'40\\' fill=\\'%23222\\'/></svg>'">
    <div>
      <div class="tweet-meta">
        <span class="topic-dot topic-${topicSlug}" style="background:${color}" title="${esc(t.topic||'')}"></span>
        <span class="tweet-name">${esc(t.name)}</span>
        <span class="tweet-handle">@${t.screen_name}</span>
        <span class="tweet-date">${fmtDate(t.tweeted_at)}</span>
      </div>
      <div class="tweet-text${isLong?' collapsed':''}" id="tt${t.id}">${linkify(t.text)}</div>
      ${isLong?`<button class="show-more-btn" onclick="expandTweet('tt${t.id}',this)">Show more ↓</button>`:''}
      ${renderMedia(t.media)}
      <a href="${escA(t.tweet_url)}" target="_blank" rel="noopener" class="open-x-link" onclick="event.stopPropagation()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.718l7.726-8.84L1.254 2.25h6.232l4.29 5.671 5.468-5.671zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
        Open on X
      </a>
    </div>
  </div>`;
}

function expandTweet(id, btn){
  const el=document.getElementById(id);
  if(el){ el.classList.remove('collapsed'); btn.style.display='none'; }
}

// ── lightbox ──────────────────────────────────────────────────────────────────
function openLb(url){
  document.getElementById('lb-content').innerHTML=`<img src="${url}" alt="">`;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-content').innerHTML='';
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeLightbox(); });

// ── filtering ─────────────────────────────────────────────────────────────────
let mediaFilter='all', topicFilter='all', searchQuery='';

function getFiltered(){
  return TWEETS.filter(t=>{
    if(mediaFilter==='photo' && !t.media.some(m=>m.type==='photo')) return false;
    if(mediaFilter==='video' && !t.media.some(m=>m.type==='video'||m.type==='gif')) return false;
    if(mediaFilter==='text' && t.media.length>0) return false;
    if(topicFilter!=='all' && t.topic!==topicFilter) return false;
    if(searchQuery){
      const q=searchQuery.toLowerCase();
      if(!t.text.toLowerCase().includes(q) && !t.name.toLowerCase().includes(q) && !t.screen_name.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function render(){
  _vidIdx=0;
  const filtered=getFiltered();
  document.getElementById('count-badge').textContent=filtered.length+' saved';
  const feed=document.getElementById('feed');
  if(!filtered.length){
    feed.innerHTML='<div class="empty"><svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><p>No bookmarks found</p></div>';
    return;
  }
  feed.innerHTML=filtered.map((t,i)=>renderTweet(t,i*10)).join('');
}

function updateStats(){
  document.getElementById('stat-total').textContent=TWEETS.length;
  document.getElementById('stat-photos').textContent=TWEETS.filter(t=>t.media.some(m=>m.type==='photo')).length;
  document.getElementById('stat-videos').textContent=TWEETS.filter(t=>t.media.some(m=>m.type==='video'||m.type==='gif')).length;
  document.getElementById('stat-authors').textContent=new Set(TWEETS.map(t=>t.screen_name)).size;
}

// media filter clicks
document.getElementById('media-filters').addEventListener('click',e=>{
  const btn=e.target.closest('[data-media]'); if(!btn) return;
  document.querySelectorAll('[data-media]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  mediaFilter=btn.dataset.media;
  render();
});
// topic filter clicks
document.getElementById('topic-filters').addEventListener('click',e=>{
  const btn=e.target.closest('[data-topic]'); if(!btn) return;
  document.querySelectorAll('[data-topic]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  topicFilter=btn.dataset.topic;
  render();
});
// search
let _st;
document.getElementById('search').addEventListener('input',e=>{
  clearTimeout(_st);
  _st=setTimeout(()=>{ searchQuery=e.target.value.trim(); render(); },200);
});

updateStats();
render();
</script>
